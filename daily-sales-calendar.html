<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>helloitskortny Daily Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #6b7a5a; --sage-mid: #8a9a6e; --sage-light: #c5d4a8;
    --tan: #c9a87a; --tan-dark: #9b6e3a;
    --cream: #f4ede0; --cream-dark: #e8dcc8;
    --ink: #2e2a24; --ink-mid: #5a5248; --ink-muted: #8a8078;
    --border: rgba(107,122,90,0.15); --white: #faf7f2;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--white); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header { background: var(--ink); color: var(--white); padding: 36px 40px 28px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .header-eyebrow { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--tan); margin-bottom: 8px; font-weight: 500; }
  header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 0.9; letter-spacing: 0.02em; }
  header h1 span { color: var(--sage-light); }
  .header-stats { display: flex; gap: 28px; flex-wrap: wrap; }
  .hstat { text-align: right; }
  .hstat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; line-height: 1; color: var(--white); }
  .hstat-label { font-size: 11px; color: #a09888; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  .controls { background: var(--cream); border-bottom: 1px solid var(--border); padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .nav-group { display: flex; align-items: center; gap: 10px; }
  .nav-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 16px; color: var(--ink-mid); transition: all 0.12s; line-height: 1; }
  .nav-btn:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .month-display { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.04em; color: var(--ink); min-width: 180px; text-align: center; }
  .controls-right { display: flex; gap: 8px; align-items: center; }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; color: var(--ink-muted); transition: all 0.12s; }
  .view-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }
  .add-btn { background: var(--sage); color: white; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; }
  .add-btn:hover { background: var(--sage-mid); }

  main { max-width: 1100px; margin: 0 auto; padding: 28px 28px 80px; }

  .month-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
  .mstat { background: var(--cream); border-radius: 8px; padding: 14px 16px; border: 1px solid var(--border); }
  .mstat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); margin-bottom: 6px; font-weight: 500; }
  .mstat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--ink); line-height: 1; }
  .mstat-val.green { color: var(--sage); }
  .mstat-sub { font-size: 11px; color: var(--ink-muted); margin-top: 3px; font-style: italic; font-family: 'DM Serif Display', serif; }

  .cal-header-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .cal-dow { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-muted); padding: 4px 8px; text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

  .day-cell { background: var(--cream); border: 1px solid transparent; border-radius: 8px; min-height: 90px; padding: 8px; position: relative; transition: border-color 0.12s; cursor: pointer; }
  .day-cell:hover { border-color: var(--sage-mid); }
  .day-cell.other-month { opacity: 0.35; pointer-events: none; }
  .day-cell.has-data { background: var(--cream-dark); border-color: rgba(107,122,90,0.2); }
  .day-cell.today { border-color: var(--sage) !important; border-width: 2px; }
  .day-num { font-size: 12px; font-weight: 500; color: var(--ink-mid); margin-bottom: 5px; line-height: 1; }
  .today .day-num-inner { background: var(--sage); color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; }
  .day-entry { background: white; border-radius: 4px; padding: 5px 7px; border-left: 2px solid var(--sage); font-size: 10px; line-height: 1.4; }
  .day-entry-product { font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-entry-gmv { color: var(--sage); font-size: 11px; font-weight: 500; margin-top: 1px; }
  .day-entry-comm { color: var(--tan-dark); font-size: 10px; }

  #list-view { display: none; }
  .list-table { width: 100%; border-collapse: collapse; }
  .list-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; background: var(--cream); }
  .list-table th.num { text-align: right; }
  .list-table td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 14px; color: var(--ink); }
  .list-table td.num { text-align: right; }
  .list-table tr:hover td { background: var(--cream); }
  .gmv-val { color: var(--sage); font-weight: 500; }
  .comm-val { color: var(--tan-dark); font-weight: 500; }
  .date-val { color: var(--ink-muted); font-size: 13px; }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: var(--ink-muted); font-style: italic; font-family: 'DM Serif Display', serif; font-size: 16px; }
  .loading-spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--sage); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(46,42,36,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 14px; border: 1px solid var(--border); padding: 32px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.03em; margin-bottom: 4px; color: var(--ink); }
  .modal-subtitle { font-size: 13px; color: var(--ink-muted); margin-bottom: 24px; font-style: italic; font-family: 'DM Serif Display', serif; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-mid); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--cream); color: var(--ink); font-size: 14px; font-family: 'DM Sans', sans-serif; transition: border-color 0.12s; outline: none; }
  .form-input:focus { border-color: var(--sage-mid); background: var(--white); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .btn-cancel { flex: 1; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 11px; font-size: 14px; cursor: pointer; color: var(--ink-muted); font-family: 'DM Sans', sans-serif; }
  .btn-cancel:hover { background: var(--cream); }
  .btn-save { flex: 2; background: var(--sage); border: none; border-radius: 8px; padding: 11px; font-size: 14px; cursor: pointer; color: white; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  .btn-save:hover { background: var(--sage-mid); }
  .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
  .form-msg { font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; font-style: italic; font-family: 'DM Serif Display', serif; }
  .form-msg.success { color: var(--sage); }
  .form-msg.error { color: var(--tan-dark); }

  @media (max-width: 680px) {
    header { padding: 24px 20px; }
    header h1 { font-size: 38px; }
    .controls { padding: 12px 20px; }
    main { padding: 16px 12px 60px; }
    .month-stats { grid-template-columns: repeat(2, 1fr); }
    .cal-dow { font-size: 9px; padding: 4px 2px; }
    .day-cell { min-height: 64px; padding: 5px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-eyebrow">@helloitskortny</div>
    <h1>Daily<br><span>Sales</span></h1>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val" id="total-gmv">—</div><div class="hstat-label">Total GMV</div></div>
    <div class="hstat"><div class="hstat-val" id="total-comm">—</div><div class="hstat-label">Total Commission</div></div>
    <div class="hstat"><div class="hstat-val" id="total-days">—</div><div class="hstat-label">Sales Days</div></div>
  </div>
</header>

<div class="controls">
  <div class="nav-group">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
    <div class="month-display" id="month-label"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
  </div>
  <div class="controls-right">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-cal" onclick="setView('cal')">Calendar</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')">List</button>
    </div>
    <button class="add-btn" onclick="openModal()">+ Log Today</button>
  </div>
</div>

<main>
  <div class="month-stats">
    <div class="mstat"><div class="mstat-label">GMV this month</div><div class="mstat-val green" id="m-gmv">—</div><div class="mstat-sub" id="m-gmv-sub">—</div></div>
    <div class="mstat"><div class="mstat-label">Commission</div><div class="mstat-val" id="m-comm">—</div><div class="mstat-sub" id="m-comm-sub">—</div></div>
    <div class="mstat"><div class="mstat-label">Sales days</div><div class="mstat-val" id="m-days">—</div><div class="mstat-sub" id="m-days-sub">—</div></div>
    <div class="mstat"><div class="mstat-label">Top seller</div><div class="mstat-val" style="font-size:18px;padding-top:4px" id="m-top">—</div><div class="mstat-sub" id="m-top-sub">—</div></div>
  </div>

  <div id="cal-view">
    <div class="cal-header-row">
      <div class="cal-dow">Sun</div><div class="cal-dow">Mon</div><div class="cal-dow">Tue</div>
      <div class="cal-dow">Wed</div><div class="cal-dow">Thu</div><div class="cal-dow">Fri</div><div class="cal-dow">Sat</div>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="loading" style="grid-column:1/-1"><div class="loading-spinner"></div>Loading from Notion...</div>
    </div>
  </div>

  <div id="list-view">
    <table class="list-table">
      <thead><tr>
        <th>Date</th><th>Top Seller</th><th class="num">GMV</th><th class="num">Commission</th>
      </tr></thead>
      <tbody id="list-body"></tbody>
    </table>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">Log a Day</div>
    <div class="modal-subtitle">Enter your totals for the day</div>
    <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="inp-date"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">GMV ($)</label><input type="number" class="form-input" id="inp-gmv" placeholder="0.00" step="0.01" min="0"></div>
      <div class="form-group"><label class="form-label">Commission ($)</label><input type="number" class="form-input" id="inp-commission" placeholder="0.00" step="0.01" min="0"></div>
    </div>
    <div class="form-group"><label class="form-label">Top Seller</label><input type="text" class="form-input" id="inp-product" placeholder="e.g. Shallow Bowls"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveSale()">Save to Notion</button>
    </div>
    <div class="form-msg" id="form-msg"></div>
  </div>
</div>

<script>
const API = 'https://kortny-api.vercel.app/api/notion';
const DB_ID = 'a35bab03eb3544729b8019ddfc019e4e';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const today = new Date();
let current = new Date(today.getFullYear(), today.getMonth(), 1);
let DATA = [];
let loading = false;

function dollarFmt(n) { return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function todayStr() { return today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0'); }

async function loadFromNotion() {
  loading = true;
  try {
    const res = await fetch(`${API}?endpoint=databases/${DB_ID}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page_size: 100, sorts: [{ property: 'Date', direction: 'ascending' }] })
    });
    const data = await res.json();
    DATA = (data.results || []).map(p => ({
      id: p.id,
      date: p.properties.Date?.date?.start || '',
      product: p.properties['Top Seller']?.title?.[0]?.plain_text || '',
      gmv: p.properties.GMV?.number || 0,
      commission: p.properties.Commission?.number || 0,
    })).filter(r => r.date);
  } catch(e) {
    console.error(e);
  }
  loading = false;
  updateHeader();
  render();
}

function updateHeader() {
  const totalGMV = DATA.reduce((s,r) => s + r.gmv, 0);
  const totalComm = DATA.reduce((s,r) => s + r.commission, 0);
  document.getElementById('total-gmv').textContent = dollarFmt(totalGMV);
  document.getElementById('total-comm').textContent = dollarFmt(totalComm);
  document.getElementById('total-days').textContent = DATA.length;
}

function getMonthData(y, m) {
  const prefix = y + '-' + String(m+1).padStart(2,'0');
  return DATA.filter(r => r.date.startsWith(prefix));
}

function updateMonthStats(y, m) {
  const data = getMonthData(y, m);
  const gmv = data.reduce((s,r) => s+r.gmv, 0);
  const comm = data.reduce((s,r) => s+r.commission, 0);
  const days = data.length;
  const byProduct = {};
  data.forEach(r => { byProduct[r.product] = (byProduct[r.product]||0) + r.gmv; });
  const top = Object.entries(byProduct).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('m-gmv').textContent = dollarFmt(gmv);
  document.getElementById('m-gmv-sub').textContent = days + ' entries';
  document.getElementById('m-comm').textContent = dollarFmt(comm);
  document.getElementById('m-comm-sub').textContent = gmv ? (comm/gmv*100).toFixed(1) + '% rate' : '—';
  document.getElementById('m-days').textContent = days;
  document.getElementById('m-days-sub').textContent = 'active days';
  document.getElementById('m-top').textContent = top ? top[0] : '—';
  document.getElementById('m-top-sub').textContent = top ? dollarFmt(top[1]) + ' GMV' : 'no data';
}

function renderCalendar(y, m) {
  document.getElementById('month-label').textContent = MONTHS[m] + ' ' + y;
  updateMonthStats(y, m);

  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();
  const ts = todayStr();
  const byDate = {};
  DATA.forEach(r => { byDate[r.date] = r; });

  const totalCells = Math.ceil((first + daysInMonth) / 7) * 7;
  let html = '';
  let day = 1, nextDay = 1;

  for (let i = 0; i < totalCells; i++) {
    let dateStr, dayNum, isOther = false;
    if (i < first) {
      dayNum = daysInPrev - first + i + 1;
      const pm = m===0?11:m-1, py = m===0?y-1:y;
      dateStr = py+'-'+String(pm+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0');
      isOther = true;
    } else if (day > daysInMonth) {
      dayNum = nextDay++;
      const nm = m===11?0:m+1, ny = m===11?y+1:y;
      dateStr = ny+'-'+String(nm+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0');
      isOther = true;
    } else {
      dayNum = day++;
      dateStr = y+'-'+String(m+1).padStart(2,'0')+'-'+String(dayNum).padStart(2,'0');
    }

    const entry = byDate[dateStr];
    const isToday = dateStr === ts;
    const clickAttr = !isOther ? `onclick="openModalForDate('${dateStr}')"` : '';

    html += `<div class="day-cell${isOther?' other-month':''}${entry?' has-data':''}${isToday?' today':''}" ${clickAttr}>`;
    if (isToday) {
      html += `<div class="day-num"><div class="day-num-inner">${dayNum}</div></div>`;
    } else {
      html += `<div class="day-num">${dayNum}</div>`;
    }
    if (entry) {
      html += `<div class="day-entry">
        <div class="day-entry-product">${entry.product}</div>
        <div class="day-entry-gmv">${dollarFmt(entry.gmv)}</div>
        <div class="day-entry-comm">comm ${dollarFmt(entry.commission)}</div>
      </div>`;
    }
    html += '</div>';
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function renderList(y, m) {
  const data = getMonthData(y, m).sort((a,b) => b.date.localeCompare(a.date));
  if (!data.length) {
    document.getElementById('list-body').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--ink-muted);font-style:italic">No sales data for this month</td></tr>';
    return;
  }
  document.getElementById('list-body').innerHTML = data.map(r => {
    const d = new Date(r.date+'T12:00:00');
    const dayStr = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
    return `<tr>
      <td class="date-val">${dayStr}</td>
      <td style="font-weight:500">${r.product}</td>
      <td class="num gmv-val">${dollarFmt(r.gmv)}</td>
      <td class="num comm-val">${dollarFmt(r.commission)}</td>
    </tr>`;
  }).join('');
}

function render() {
  const y = current.getFullYear(), m = current.getMonth();
  renderCalendar(y, m);
  renderList(y, m);
}

function changeMonth(dir) {
  current = new Date(current.getFullYear(), current.getMonth() + dir, 1);
  render();
}

function setView(v) {
  document.getElementById('cal-view').style.display = v==='cal'?'block':'none';
  document.getElementById('list-view').style.display = v==='list'?'block':'none';
  document.getElementById('btn-cal').className = 'view-btn'+(v==='cal'?' active':'');
  document.getElementById('btn-list').className = 'view-btn'+(v==='list'?' active':'');
}

function openModal() {
  document.getElementById('inp-date').value = todayStr();
  document.getElementById('inp-gmv').value = '';
  document.getElementById('inp-commission').value = '';
  document.getElementById('inp-product').value = '';
  document.getElementById('form-msg').textContent = '';
  document.getElementById('btn-save').disabled = false;
  document.getElementById('btn-save').textContent = 'Save to Notion';
  document.getElementById('modal-overlay').classList.add('open');
}

function openModalForDate(dateStr) {
  openModal();
  document.getElementById('inp-date').value = dateStr;
  const existing = DATA.find(r => r.date === dateStr);
  if (existing) {
    document.getElementById('inp-gmv').value = existing.gmv;
    document.getElementById('inp-commission').value = existing.commission;
    document.getElementById('inp-product').value = existing.product;
  }
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

async function saveSale() {
  const date = document.getElementById('inp-date').value;
  const gmv = parseFloat(document.getElementById('inp-gmv').value);
  const commission = parseFloat(document.getElementById('inp-commission').value) || 0;
  const product = document.getElementById('inp-product').value.trim();
  if (!date || isNaN(gmv) || !product) { showMsg('Please fill in all fields.', 'error'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Saving...';

  try {
    const res = await fetch(`${API}?endpoint=pages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        parent: { database_id: DB_ID },
        properties: {
          'Top Seller': { title: [{ text: { content: product } }] },
          'Date': { date: { start: date } },
          'GMV': { number: gmv },
          'Commission': { number: commission }
        }
      })
    });

    if (res.ok) {
      const newEntry = { id: Date.now().toString(), date, product, gmv, commission };
      DATA.push(newEntry);
      DATA.sort((a,b) => a.date.localeCompare(b.date));
      updateHeader(); render();
      showMsg('Saved to Notion! ✓', 'success');
      btn.textContent = 'Saved ✓';
      setTimeout(closeModal, 1200);
    } else {
      showMsg('Error saving. Try again.', 'error');
      btn.disabled = false; btn.textContent = 'Save to Notion';
    }
  } catch(e) {
    showMsg('Network error. Try again.', 'error');
    btn.disabled = false; btn.textContent = 'Save to Notion';
  }
}

function showMsg(msg, type) {
  const el = document.getElementById('form-msg');
  el.textContent = msg;
  el.className = 'form-msg ' + type;
}

document.getElementById('modal-overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });

loadFromNotion();
</script>
</body>
</html>
