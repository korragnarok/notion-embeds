<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#120d09">
<title>Commissions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
:root{--espresso:#120d09;--brown-deep:#1c1410;--brown-mid:#2a1e16;--brown-lift:#3d2a1e;--brown-surface:#4a3428;--sage:#7a9e7e;--sage-light:#a8c5a4;--sage-dim:#4a6b4e;--tan:#c9a87a;--tan-dim:#7a5e3a;--text-bright:#f0e8de;--text-mid:#a89880;--text-muted:#6a5848;--border:rgba(200,168,120,0.1);--border-lift:rgba(200,168,120,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--espresso);color:var(--text-bright);font-family:'DM Sans',sans-serif;min-height:100vh;}
nav{background:rgba(18,13,9,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text-bright);text-decoration:none;}
.nav-logo span{color:var(--sage-light);font-style:italic;}
.nav-right{display:flex;gap:8px;}
.nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;text-decoration:none;display:inline-flex;align-items:center;}
.nav-btn:hover{border-color:var(--border-lift);color:var(--text-bright);}
.nav-btn.primary{background:var(--sage);color:var(--espresso);border-color:var(--sage);font-weight:600;}
.page-header{padding:24px 28px 18px;border-bottom:1px solid var(--border);}
.page-eyebrow{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--tan);margin-bottom:6px;font-weight:500;display:flex;align-items:center;gap:10px;}
.page-eyebrow::before{content:'';display:inline-block;width:20px;height:1px;background:var(--tan-dim);}
.page-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1;color:var(--text-bright);}
.page-title em{font-style:italic;color:var(--sage-light);}
.main{max-width:1100px;margin:0 auto;padding:20px 24px 60px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat{background:var(--brown-mid);border-radius:12px;border:1px solid var(--border);padding:14px 16px;}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-muted);font-weight:600;margin-bottom:6px;}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1;color:var(--text-bright);}
.stat-val.green{color:var(--sage-light);}
.stat-val.tan{color:var(--tan);}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:3px;}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-btn{background:var(--brown-mid);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;color:var(--text-muted);transition:all 0.12s;}
.filter-btn.active{background:var(--text-bright);color:var(--espresso);border-color:var(--text-bright);}
.search-input{flex:1;min-width:160px;padding:7px 14px;border:1px solid var(--border);border-radius:100px;background:var(--brown-mid);color:var(--text-bright);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{border-color:var(--sage-dim);}
.table-wrap{background:var(--brown-mid);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--brown-lift);font-weight:600;cursor:pointer;white-space:nowrap;}
thead th:hover{color:var(--text-bright);}
thead th.num{text-align:right;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--brown-lift);}
tbody td{padding:11px 14px;font-size:13px;color:var(--text-bright);}
tbody td.num{text-align:right;}
.order-num{color:var(--text-muted);font-size:12px;}
.product-name{font-weight:500;}
.comm-val{color:var(--sage-light);font-weight:500;}
.date-val{color:var(--text-muted);font-size:12px;}
.status-pill{display:inline-block;padding:2px 10px;border-radius:100px;font-size:11px;font-weight:500;}
.status-Settled{background:rgba(122,158,126,0.2);color:var(--sage-light);}
.status-Pending{background:rgba(201,168,122,0.15);color:var(--tan);}
.status-Ineligible{background:rgba(106,88,72,0.3);color:var(--text-muted);}
.action-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:2px 5px;border-radius:4px;}
.action-btn:hover{background:var(--brown-surface);color:var(--text-bright);}
.empty-state{text-align:center;padding:48px;color:var(--text-muted);}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);}
.page-btns{display:flex;gap:4px;flex-wrap:wrap;}
.page-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;}
.page-btn:hover,.page-btn.active{background:var(--sage);color:var(--espresso);border-color:var(--sage);}
.loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(12,8,4,0.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--brown-mid);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;padding:24px 20px 32px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,0.5);}
.modal-handle{width:36px;height:4px;background:var(--brown-surface);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:20px;color:var(--text-bright);}
.form-group{margin-bottom:13px;}
.form-label{display:block;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.form-input,.form-select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:12px;background:var(--brown-deep);color:var(--text-bright);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;transition:border-color 0.12s;}
.form-input::placeholder{color:var(--text-muted);}
.form-input:focus,.form-select:focus{border-color:var(--sage-dim);}
.form-select option{background:var(--brown-deep);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.btn-cancel{flex:1;background:var(--brown-lift);border:none;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;}
.btn-save{flex:2;background:var(--sage);border:none;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;color:var(--espresso);font-family:'DM Sans',sans-serif;font-weight:600;}
.btn-save:disabled{opacity:0.6;cursor:not-allowed;}
.form-msg{font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
.form-msg.success{color:var(--sage-light);}
.form-msg.error{color:#d4604a;}
@media(max-width:640px){.stats{grid-template-columns:1fr 1fr;}.main{padding:14px 12px 60px;}.form-row{grid-template-columns:1fr;}}
</style>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")
          .then(reg => console.log("[SW] Registered", reg.scope))
          .catch(err => console.warn("[SW] Failed", err));
      });
    }
  </script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">hello<span>itskortny</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-btn">← Home</a>
    <button class="nav-btn" onclick="loadFromNotion()">↻ Refresh</button>
    <button class="nav-btn primary" onclick="openModal()">+ Add Entry</button>
  </div>
</nav>
<div class="page-header">
  <div class="page-eyebrow">@helloitskortny</div>
  <div class="page-title">Commissions <em>Tracker</em></div>
</div>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-label">Total Settled</div><div class="stat-val green" id="stat-settled">—</div><div class="stat-sub" id="stat-settled-sub">—</div></div>
    <div class="stat"><div class="stat-label">Pending</div><div class="stat-val tan" id="stat-pending">—</div><div class="stat-sub" id="stat-pending-sub">—</div></div>
    <div class="stat"><div class="stat-label">Total Earned</div><div class="stat-val" id="stat-total">—</div><div class="stat-sub">settled + pending</div></div>
    <div class="stat"><div class="stat-label">Total Orders</div><div class="stat-val" id="stat-orders">—</div><div class="stat-sub">all time</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Settled',this)">Settled</button>
    <button class="filter-btn" onclick="setFilter('Pending',this)">Pending</button>
    <button class="filter-btn" onclick="setFilter('Ineligible',this)">Ineligible</button>
    <input type="text" class="search-input" id="search-input" placeholder="Search product or order #..." oninput="goPage(1)">
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('order')">Order #</th>
        <th onclick="sortBy('product')">Brand / Product</th>
        <th onclick="sortBy('commission')" class="num">Commission</th>
        <th onclick="sortBy('status')">Status</th>
        <th onclick="sortBy('orderDate')">Order Date</th>
        <th onclick="sortBy('paidDate')">Paid Date</th>
        <th></th>
      </tr></thead>
      <tbody id="table-body"><tr><td colspan="7"><div style="text-align:center;padding:32px"><div class="loading-spinner"></div><div style="color:var(--text-muted)">Loading from Notion...</div></div></td></tr></tbody>
    </table>
    <div class="pagination"><span id="page-info"></span><div class="page-btns" id="page-btns"></div></div>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add Entry</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Order / Video #</label><input type="text" class="form-input" id="inp-order" placeholder="e.g. 5591"></div>
      <div class="form-group"><label class="form-label">Commission ($)</label><input type="number" class="form-input" id="inp-commission" placeholder="0.00" step="0.01" min="0"></div>
    </div>
    <div class="form-group"><label class="form-label">Brand / Product</label><input type="text" class="form-input" id="inp-product" placeholder="e.g. Shallow Bowls"></div>
    <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="inp-status"><option value="Pending">Pending</option><option value="Settled">Settled</option><option value="Ineligible">Ineligible</option></select></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Order Date</label><input type="date" class="form-input" id="inp-order-date"></div>
      <div class="form-group"><label class="form-label">Paid Date</label><input type="date" class="form-input" id="inp-paid-date"></div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label><input type="text" class="form-input" id="inp-notes" placeholder="Optional"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveEntry()">Save to Notion</button>
    </div>
    <div class="form-msg" id="form-msg"></div>
  </div>
</div>
<script>
const API='https://kortny-api.vercel.app/api/notion';
const DB_ID='47a77144c4644149b499cef40bf72bf5';
const PAGE_SIZE=25;
let DATA=[],filterStatus='All',sortField='orderDate',sortDir=-1,currentPage=1,editingId=null;
function fmtD(n){return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});}
async function loadFromNotion(){
  document.getElementById('table-body').innerHTML='<tr><td colspan="7"><div style="text-align:center;padding:32px"><div class="loading-spinner"></div><div style="color:var(--text-muted)">Loading...</div></div></td></tr>';
  try{
    let results=[],cursor=null;
    do{const body={page_size:100,sorts:[{property:'Order date',direction:'descending'}]};if(cursor)body.start_cursor=cursor;const res=await fetch(`${API}?endpoint=databases/${DB_ID}/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();results=[...results,...(data.results||[])];cursor=data.next_cursor;}while(cursor);
    DATA=results.map(p=>({id:p.id,order:p.properties['Order / Video']?.title?.[0]?.plain_text||'',product:p.properties['Brand / Product']?.rich_text?.[0]?.plain_text||'',commission:p.properties.Commission?.number||0,status:p.properties.Status?.status?.name||'Pending',orderDate:p.properties['Order date']?.date?.start||'',paidDate:p.properties['Paid date']?.date?.start||'',notes:p.properties.Notes?.rich_text?.[0]?.plain_text||''}));
    updateStats();goPage(1);
  }catch(e){document.getElementById('table-body').innerHTML='<tr><td colspan="7" class="empty-state">Error loading. Try refreshing.</td></tr>';}
}
function updateStats(){
  const settled=DATA.filter(r=>r.status==='Settled').reduce((s,r)=>s+r.commission,0);
  const pending=DATA.filter(r=>r.status==='Pending').reduce((s,r)=>s+r.commission,0);
  const sc=DATA.filter(r=>r.status==='Settled').length,pc=DATA.filter(r=>r.status==='Pending').length;
  document.getElementById('stat-settled').textContent=fmtD(settled);document.getElementById('stat-settled-sub').textContent=sc+' orders';
  document.getElementById('stat-pending').textContent=fmtD(pending);document.getElementById('stat-pending-sub').textContent=pc+' orders';
  document.getElementById('stat-total').textContent=fmtD(settled+pending);document.getElementById('stat-orders').textContent=DATA.length;
}
function setFilter(status,btn){filterStatus=status;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');goPage(1);}
function sortBy(field){if(sortField===field)sortDir*=-1;else{sortField=field;sortDir=-1;}goPage(1);}
function getFiltered(){const search=document.getElementById('search-input').value.toLowerCase();return DATA.filter(r=>{if(filterStatus!=='All'&&r.status!==filterStatus)return false;if(search&&!r.product.toLowerCase().includes(search)&&!r.order.toLowerCase().includes(search))return false;return true;}).sort((a,b)=>{let av=a[sortField]||'',bv=b[sortField]||'';if(sortField==='commission'){av=Number(a.commission);bv=Number(b.commission);}if(av<bv)return -1*sortDir;if(av>bv)return 1*sortDir;return 0;});}
function goPage(p){currentPage=p;renderTable();}
function renderTable(){
  const filtered=getFiltered(),total=filtered.length,pages=Math.ceil(total/PAGE_SIZE)||1;
  if(currentPage>pages)currentPage=pages;
  const start=(currentPage-1)*PAGE_SIZE,rows=filtered.slice(start,start+PAGE_SIZE);
  document.getElementById('page-info').textContent=total?`Showing ${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total}`:'';
  const btns=document.getElementById('page-btns');btns.innerHTML='';
  for(let i=1;i<=pages;i++){const b=document.createElement('button');b.className='page-btn'+(i===currentPage?' active':'');b.textContent=i;b.onclick=(()=>{const pg=i;return()=>goPage(pg);})();btns.appendChild(b);}
  const tbody=document.getElementById('table-body');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="7" class="empty-state">No entries found</td></tr>';return;}
  tbody.innerHTML=rows.map(r=>`<tr><td class="order-num">${r.order?'#'+r.order:'—'}</td><td class="product-name">${r.product||'—'}</td><td class="num comm-val">${fmtD(r.commission)}</td><td><span class="status-pill status-${r.status}">${r.status}</span></td><td class="date-val">${fmtDate(r.orderDate)}</td><td class="date-val">${fmtDate(r.paidDate)}</td><td><button class="action-btn" onclick="editEntry('${r.id}')">✎</button></td></tr>`).join('');
}
function openModal(id=null){
  editingId=id;document.getElementById('form-msg').textContent='';document.getElementById('btn-save').disabled=false;
  if(id){const r=DATA.find(x=>x.id===id);document.getElementById('modal-title').textContent='Edit Entry';document.getElementById('inp-order').value=r.order;document.getElementById('inp-commission').value=r.commission;document.getElementById('inp-product').value=r.product;document.getElementById('inp-status').value=r.status;document.getElementById('inp-order-date').value=r.orderDate;document.getElementById('inp-paid-date').value=r.paidDate;document.getElementById('inp-notes').value=r.notes;document.getElementById('btn-save').textContent='Save Changes';}
  else{document.getElementById('modal-title').textContent='Add Entry';document.getElementById('inp-order').value='';document.getElementById('inp-commission').value='';document.getElementById('inp-product').value='';document.getElementById('inp-status').value='Pending';document.getElementById('inp-order-date').value=new Date().toISOString().split('T')[0];document.getElementById('inp-paid-date').value='';document.getElementById('inp-notes').value='';document.getElementById('btn-save').textContent='Save to Notion';}
  document.getElementById('modal-overlay').classList.add('open');
}
function editEntry(id){openModal(id);}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
async function saveEntry(){
  const order=document.getElementById('inp-order').value.trim(),commission=parseFloat(document.getElementById('inp-commission').value),product=document.getElementById('inp-product').value.trim(),status=document.getElementById('inp-status').value,orderDate=document.getElementById('inp-order-date').value,paidDate=document.getElementById('inp-paid-date').value,notes=document.getElementById('inp-notes').value.trim();
  if(!product||isNaN(commission)){showMsg('Please fill in product and commission.','error');return;}
  const btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Saving...';
  const properties={'Order / Video':{title:[{text:{content:order||'—'}}]},'Brand / Product':{rich_text:[{text:{content:product}}]},'Commission':{number:commission},'Status':{status:{name:status}},'Notes':{rich_text:[{text:{content:notes}}]},...(orderDate?{'Order date':{date:{start:orderDate}}}:{}),...(paidDate?{'Paid date':{date:{start:paidDate}}}:{})};
  try{
    let res;
    if(editingId){res=await fetch(`${API}?endpoint=pages/${editingId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({properties})});}
    else{res=await fetch(`${API}?endpoint=pages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({parent:{database_id:DB_ID},properties})});}
    if(res.ok){showMsg(editingId?'Updated! ✓':'Saved! ✓','success');btn.textContent='Saved ✓';setTimeout(()=>{closeModal();loadFromNotion();},1200);}
    else{showMsg('Error saving.','error');btn.disabled=false;btn.textContent='Save to Notion';}
  }catch(e){showMsg('Network error.','error');btn.disabled=false;btn.textContent='Save to Notion';}
}
function showMsg(msg,type){const el=document.getElementById('form-msg');el.textContent=msg;el.className='form-msg '+type;}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
loadFromNotion();
</script>
</body>
</html>
