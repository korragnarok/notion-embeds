<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#120d09">
<title>Hook Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
:root{--espresso:#120d09;--brown-deep:#1c1410;--brown-mid:#2a1e16;--brown-lift:#3d2a1e;--brown-surface:#4a3428;--sage:#7a9e7e;--sage-light:#a8c5a4;--sage-dim:#4a6b4e;--tan:#c9a87a;--tan-dim:#7a5e3a;--text-bright:#f0e8de;--text-mid:#a89880;--text-muted:#6a5848;--border:rgba(200,168,120,0.1);--border-lift:rgba(200,168,120,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--espresso);color:var(--text-bright);font-family:'DM Sans',sans-serif;min-height:100vh;}
nav{background:rgba(18,13,9,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text-bright);text-decoration:none;}
.nav-logo span{color:var(--sage-light);font-style:italic;}
.nav-right{display:flex;gap:8px;}
.nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;text-decoration:none;display:inline-flex;align-items:center;}
.nav-btn:hover{border-color:var(--border-lift);color:var(--text-bright);}
.nav-btn.primary{background:var(--sage);color:var(--espresso);border-color:var(--sage);font-weight:600;}
.page-header{background:var(--brown-deep);padding:32px 48px 28px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.page-header::before{content:'🎣';position:absolute;right:-10px;top:-10px;font-size:160px;opacity:0.04;pointer-events:none;}
.page-eyebrow{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--tan);margin-bottom:10px;font-weight:500;display:flex;align-items:center;gap:10px;}
.page-eyebrow::before{content:'';display:inline-block;width:20px;height:1px;background:var(--tan-dim);}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(48px,7vw,80px);line-height:0.9;margin-bottom:14px;letter-spacing:-0.02em;}
.page-title em{font-style:italic;color:var(--tan);}
.page-sub{font-size:14px;color:var(--text-muted);max-width:400px;line-height:1.6;}
.toc{background:var(--brown-deep);border-bottom:1px solid var(--border);padding:14px 48px;display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;}
.toc-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);margin-right:4px;}
.toc-link{font-size:12px;color:var(--text-mid);text-decoration:none;padding:4px 12px;border:1px solid var(--border);border-radius:100px;transition:all 0.12s;white-space:nowrap;background:var(--brown-mid);}
.toc-link:hover{background:var(--sage);color:var(--espresso);border-color:var(--sage);}
.search-bar{padding:16px 48px;background:var(--espresso);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;}
.search-input{flex:1;max-width:480px;padding:10px 16px;border:1px solid var(--border);border-radius:100px;background:var(--brown-mid);color:var(--text-bright);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{border-color:var(--sage-dim);}
.search-count{font-size:13px;color:var(--text-muted);}
main{max-width:860px;margin:0 auto;padding:40px 40px 100px;}
.hook-section{margin-bottom:56px;scroll-margin-top:32px;}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border-lift);}
.section-emoji{font-size:24px;}
.section-title-text{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1;flex:1;letter-spacing:-0.01em;}
.section-count{font-size:12px;color:var(--text-muted);}
.section-actions{display:flex;gap:6px;margin-left:auto;}
.icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all 0.12s;}
.icon-btn:hover{background:var(--sage);color:var(--espresso);border-color:var(--sage);}
.icon-btn.danger:hover{background:rgba(180,60,60,0.2);color:#d4604a;border-color:rgba(180,60,60,0.3);}
.hooks-list{display:flex;flex-direction:column;gap:8px;}
.hook-card{background:var(--brown-mid);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;transition:all 0.12s;position:relative;}
.hook-card:hover{border-color:var(--border-lift);transform:translateX(3px);}
.hook-num{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--tan-dim);min-width:22px;line-height:1;margin-top:2px;}
.hook-text{font-size:14px;line-height:1.6;color:var(--text-mid);flex:1;}
.hook-card-btns{display:flex;gap:4px;opacity:0;transition:opacity 0.12s;flex-shrink:0;}
.hook-card:hover .hook-card-btns{opacity:1;}
.hook-action{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;transition:all 0.12s;white-space:nowrap;}
.hook-action:hover{background:var(--sage);color:var(--espresso);border-color:var(--sage);}
.hook-action.copy-btn.copied{background:var(--sage-dim);color:var(--sage-light);opacity:1;}
.hook-action.del:hover{background:rgba(180,60,60,0.15);color:#d4604a;border-color:rgba(180,60,60,0.25);}
.add-hook-btn{width:100%;margin-top:8px;background:none;border:1px dashed var(--border);border-radius:10px;padding:12px;font-size:13px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;text-align:center;}
.add-hook-btn:hover{border-color:var(--sage-dim);color:var(--sage-light);}
.loading-state{text-align:center;padding:60px;color:var(--text-muted);}
.loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(12,8,4,0.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--brown-mid);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;padding:24px 20px 32px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,0.5);}
.modal-handle{width:36px;height:4px;background:var(--brown-surface);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:20px;color:var(--text-bright);}
.form-group{margin-bottom:13px;}
.form-label{display:block;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:12px;background:var(--brown-deep);color:var(--text-bright);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;}
.form-input::placeholder,.form-textarea::placeholder{color:var(--text-muted);}
.form-textarea{resize:vertical;min-height:90px;line-height:1.5;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--sage-dim);}
.form-select option{background:var(--brown-deep);}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.btn-cancel{flex:1;background:var(--brown-lift);border:none;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;}
.btn-save{flex:2;background:var(--sage);border:none;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;color:var(--espresso);font-family:'DM Sans',sans-serif;font-weight:600;}
.btn-save:disabled{opacity:0.6;cursor:not-allowed;}
.form-msg{font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
.form-msg.success{color:var(--sage-light);}
.form-msg.error{color:#d4604a;}
.toast{position:fixed;bottom:28px;right:28px;background:var(--brown-lift);color:var(--text-bright);border:1px solid var(--border-lift);padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transform:translateY(12px);transition:all 0.18s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
@media(max-width:640px){.page-header,.toc,.search-bar{padding-left:20px;padding-right:20px;}main{padding:28px 20px 80px;}}
</style>

        navigator.serviceWorker.register("/service-worker.js")
          .then(reg => console.log("[SW] Registered", reg.scope))
          .catch(err => console.warn("[SW] Failed", err));
      });
    }

</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">hello<span>itskortny</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-btn">← Home</a>
    <button class="nav-btn" onclick="loadFromNotion()">↻ Refresh</button>
    <button class="nav-btn primary" onclick="openCategoryModal()">+ Category</button>
  </div>
</nav>
<div class="page-header">
  <div class="page-eyebrow">Content Strategy</div>
  <div class="page-title">Hooks<br><em>that</em><br>print</div>
  <div class="page-sub">Your reusable hook library — synced via Notion.</div>
</div>
<nav class="toc" id="toc"></nav>
<div class="search-bar">
  <input type="text" class="search-input" id="search-input" placeholder="Search hooks..." oninput="renderAll()">
  <span class="search-count" id="search-count"></span>
</div>
<main id="main-content">
  <div class="loading-state"><div class="loading-spinner"></div>Loading from Notion...</div>
</main>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="hook-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="hook-modal-title">Add Hook</div>
    <div class="form-group"><label class="form-label">Hook Text</label><textarea class="form-textarea" id="hook-text" placeholder="Write your hook here..."></textarea></div>
    <div class="form-group"><label class="form-label">Category</label><select class="form-select" id="hook-category"></select></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeHookModal()">Cancel</button>
      <button class="btn-save" id="hook-save-btn" onclick="saveHook()">Save Hook</button>
    </div>
    <div class="form-msg" id="hook-form-msg"></div>
  </div>
</div>
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="cat-modal-title">Add Category</div>
    <div class="form-group"><label class="form-label">Category Name</label><input type="text" class="form-input" id="cat-name" placeholder="e.g. Impulse Buy Hooks"></div>
    <div class="form-group"><label class="form-label">Emoji</label><input type="text" class="form-input" id="cat-emoji" placeholder="e.g. 🛒" maxlength="4"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCatModal()">Cancel</button>
      <button class="btn-save" id="cat-save-btn" onclick="saveCategory()">Save Category</button>
    </div>
    <div class="form-msg" id="cat-form-msg"></div>
  </div>
</div>
<script>
const API='https://kortny-api.vercel.app/api/notion';
const HOOKS_DB='18bbb9e6ad7241be9c4b5dfac1bb8fcc';
let HOOKS=[],CATEGORIES=[],editingHookId=null;
async function loadFromNotion(){
  document.getElementById('main-content').innerHTML='<div class="loading-state"><div class="loading-spinner"></div>Loading from Notion...</div>';
  try{
    let results=[],cursor=null;
    do{const body={page_size:100};if(cursor)body.start_cursor=cursor;const res=await fetch(`${API}?endpoint=databases/${HOOKS_DB}/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();results=[...results,...(data.results||[])];cursor=data.next_cursor;}while(cursor);
    HOOKS=results.map(p=>({notionId:p.id,text:p.properties['Hook Text']?.title?.[0]?.plain_text||'',catId:p.properties['Category ID']?.rich_text?.[0]?.plain_text||'',catName:p.properties.Category?.rich_text?.[0]?.plain_text||'',catEmoji:p.properties['Category Emoji']?.rich_text?.[0]?.plain_text||'🎣'})).filter(h=>h.text);
    const catMap={};HOOKS.forEach(h=>{if(h.catName){const normalizedId=h.catName.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');if(!catMap[normalizedId])catMap[normalizedId]={id:normalizedId,name:h.catName,emoji:h.catEmoji};h.catId=normalizedId;}});
    CATEGORIES=Object.values(catMap);
    syncToLocalStorage();renderAll();
  }catch(e){document.getElementById('main-content').innerHTML='<div class="loading-state">Error loading. Try refreshing.</div>';}
}
function syncToLocalStorage(){localStorage.setItem('kortny-hooks-v2',JSON.stringify({categories:CATEGORIES.map(c=>({id:c.id,name:c.name,emoji:c.emoji})),hooks:HOOKS.map(h=>({id:h.notionId,catId:h.catId,text:h.text}))}));}
function buildTOC(){
  const search=document.getElementById('search-input').value.toLowerCase();const toc=document.getElementById('toc');toc.innerHTML='<span class="toc-label">Jump to</span>';
  CATEGORIES.forEach(cat=>{const hooks=HOOKS.filter(h=>h.catId===cat.id);if(search&&!hooks.some(h=>h.text.toLowerCase().includes(search)))return;const a=document.createElement('a');a.href='#cat-'+cat.id;a.className='toc-link';a.textContent=cat.emoji+' '+cat.name;toc.appendChild(a);});
}
function renderAll(){
  const search=document.getElementById('search-input').value.toLowerCase();buildTOC();const main=document.getElementById('main-content');let html='',totalVisible=0;
  CATEGORIES.forEach(cat=>{
    let hooks=HOOKS.filter(h=>h.catId===cat.id);if(search)hooks=hooks.filter(h=>h.text.toLowerCase().includes(search));if(search&&hooks.length===0)return;totalVisible+=hooks.length;
    html+=`<div class="hook-section" id="cat-${cat.id}"><div class="section-header"><span class="section-emoji">${cat.emoji}</span><span class="section-title-text">${cat.name}</span><span class="section-count">${hooks.length} hooks</span><div class="section-actions"><button class="icon-btn" onclick="openHookModal(null,'${cat.id}')">+ Add</button><button class="icon-btn" onclick="editCat('${cat.id}')">✎</button><button class="icon-btn danger" onclick="deleteCat('${cat.id}')">✕</button></div></div><div class="hooks-list">`;
    hooks.forEach((h,i)=>{html+=`<div class="hook-card"><span class="hook-num">${i+1}</span><p class="hook-text">${h.text}</p><div class="hook-card-btns"><button class="hook-action copy-btn" onclick="copyHook(this,'${h.notionId}')">Copy</button><button class="hook-action" onclick="openHookModal('${h.notionId}','${cat.id}')">✎</button><button class="hook-action del" onclick="deleteHook('${h.notionId}')">✕</button></div></div>`;});
    html+=`</div><button class="add-hook-btn" onclick="openHookModal(null,'${cat.id}')">+ Add hook to ${cat.name}</button></div>`;
  });
  if(!html)html='<p style="text-align:center;padding:60px;color:var(--text-muted)">No hooks match your search</p>';
  main.innerHTML=html;document.getElementById('search-count').textContent=search?totalVisible+' hooks found':HOOKS.length+' hooks total';
}
function openHookModal(hookNotionId,catId){
  editingHookId=hookNotionId;const sel=document.getElementById('hook-category');sel.innerHTML=CATEGORIES.map(c=>`<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
  if(hookNotionId){const h=HOOKS.find(x=>x.notionId===hookNotionId);document.getElementById('hook-modal-title').textContent='Edit Hook';document.getElementById('hook-text').value=h.text;sel.value=h.catId;}
  else{document.getElementById('hook-modal-title').textContent='Add Hook';document.getElementById('hook-text').value='';sel.value=catId||CATEGORIES[0]?.id;}
  document.getElementById('hook-form-msg').textContent='';document.getElementById('hook-save-btn').disabled=false;document.getElementById('hook-save-btn').textContent=hookNotionId?'Save Changes':'Save Hook';document.getElementById('hook-modal').classList.add('open');
}
function closeHookModal(){document.getElementById('hook-modal').classList.remove('open');}
async function saveHook(){
  const text=document.getElementById('hook-text').value.trim(),catId=document.getElementById('hook-category').value,cat=CATEGORIES.find(c=>c.id===catId);
  if(!text){showFormMsg('hook','Please enter a hook.','error');return;}
  const btn=document.getElementById('hook-save-btn');btn.disabled=true;btn.textContent='Saving...';
  const properties={'Hook Text':{title:[{text:{content:text}}]},'Category':{rich_text:[{text:{content:cat?.name||''}}]},'Category Emoji':{rich_text:[{text:{content:cat?.emoji||'🎣'}}]},'Category ID':{rich_text:[{text:{content:catId}}]}};
  try{
    let res;
    if(editingHookId){res=await fetch(`${API}?endpoint=pages/${editingHookId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({properties})});if(res.ok){const h=HOOKS.find(x=>x.notionId===editingHookId);if(h){h.text=text;h.catId=catId;h.catName=cat?.name||'';h.catEmoji=cat?.emoji||'🎣';}}}
    else{res=await fetch(`${API}?endpoint=pages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({parent:{database_id:HOOKS_DB},properties})});if(res.ok){const data=await res.json();HOOKS.push({notionId:data.id,text,catId,catName:cat?.name||'',catEmoji:cat?.emoji||'🎣'});}}
    if(res.ok){syncToLocalStorage();renderAll();closeHookModal();showToast(editingHookId?'Hook updated!':'Hook added!');}
    else{showFormMsg('hook','Error saving.','error');btn.disabled=false;btn.textContent='Save Hook';}
  }catch(e){showFormMsg('hook','Network error.','error');btn.disabled=false;btn.textContent='Save Hook';}
}
async function deleteHook(notionId){
  if(!confirm('Delete this hook?'))return;
  try{await fetch(`${API}?endpoint=pages/${notionId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({archived:true})});HOOKS=HOOKS.filter(h=>h.notionId!==notionId);syncToLocalStorage();renderAll();showToast('Hook deleted');}catch(e){showToast('Error deleting');}
}
function openCategoryModal(){document.getElementById('cat-modal-title').textContent='Add Category';document.getElementById('cat-name').value='';document.getElementById('cat-emoji').value='';document.getElementById('cat-form-msg').textContent='';document.getElementById('cat-save-btn').disabled=false;document.getElementById('cat-save-btn').textContent='Save Category';delete document.getElementById('cat-modal').dataset.editingCat;document.getElementById('cat-modal').classList.add('open');}
function editCat(id){const cat=CATEGORIES.find(c=>c.id===id);document.getElementById('cat-modal-title').textContent='Edit Category';document.getElementById('cat-name').value=cat.name;document.getElementById('cat-emoji').value=cat.emoji;document.getElementById('cat-form-msg').textContent='';document.getElementById('cat-save-btn').disabled=false;document.getElementById('cat-save-btn').textContent='Save Changes';document.getElementById('cat-modal').dataset.editingCat=id;document.getElementById('cat-modal').classList.add('open');}
function closeCatModal(){document.getElementById('cat-modal').classList.remove('open');delete document.getElementById('cat-modal').dataset.editingCat;}
async function saveCategory(){
  const name=document.getElementById('cat-name').value.trim(),emoji=document.getElementById('cat-emoji').value.trim()||'📌',editingCatId=document.getElementById('cat-modal').dataset.editingCat;
  if(!name){showFormMsg('cat','Please enter a name.','error');return;}
  const btn=document.getElementById('cat-save-btn');btn.disabled=true;btn.textContent='Saving...';
  if(editingCatId){const catHooks=HOOKS.filter(h=>h.catId===editingCatId);for(const h of catHooks){await fetch(`${API}?endpoint=pages/${h.notionId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({properties:{'Category':{rich_text:[{text:{content:name}}]},'Category Emoji':{rich_text:[{text:{content:emoji}}]}}})});h.catName=name;h.catEmoji=emoji;}const cat=CATEGORIES.find(c=>c.id===editingCatId);if(cat){cat.name=name;cat.emoji=emoji;}syncToLocalStorage();renderAll();closeCatModal();showToast('Category updated!');}
  else{const newId=name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');CATEGORIES.push({id:newId,name,emoji});syncToLocalStorage();renderAll();closeCatModal();showToast('Category added!');btn.disabled=false;}
}
async function deleteCat(id){const cat=CATEGORIES.find(c=>c.id===id),hookCount=HOOKS.filter(h=>h.catId===id).length;if(!confirm(`Delete "${cat.name}" and its ${hookCount} hooks?`))return;const catHooks=HOOKS.filter(h=>h.catId===id);for(const h of catHooks){await fetch(`${API}?endpoint=pages/${h.notionId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({archived:true})});}HOOKS=HOOKS.filter(h=>h.catId!==id);CATEGORIES=CATEGORIES.filter(c=>c.id!==id);syncToLocalStorage();renderAll();showToast('Category deleted');}
function copyHook(btn,notionId){const h=HOOKS.find(x=>x.notionId===notionId);navigator.clipboard.writeText(h.text).then(()=>{btn.textContent='✓';btn.classList.add('copied');showToast('Copied!');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);});}
function showFormMsg(type,msg,cls){const el=document.getElementById(type+'-form-msg');el.textContent=msg;el.className='form-msg '+cls;}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
document.getElementById('hook-modal').addEventListener('click',function(e){if(e.target===this)closeHookModal();});
