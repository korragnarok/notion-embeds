<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hook Formula Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:#6b7a5a;--sage-mid:#8a9a6e;--sage-light:#c5d4a8;
    --tan:#c9a87a;--tan-dark:#9b6e3a;
    --cream:#f4ede0;--cream-dark:#e8dcc8;
    --ink:#2e2a24;--ink-mid:#5a5248;--ink-muted:#8a8078;
    --border:rgba(107,122,90,0.15);--white:#faf7f2;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--white);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;}
  header{background:var(--ink);color:var(--white);padding:40px 48px 32px;position:relative;overflow:hidden;}
  header::before{content:'🎣';position:absolute;right:-20px;top:-20px;font-size:180px;opacity:0.06;pointer-events:none;}
  .header-label{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--tan);margin-bottom:14px;font-weight:500;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,8vw,100px);line-height:0.9;margin-bottom:20px;}
  header h1 span{color:var(--tan);}
  header p{font-size:15px;color:#a09888;max-width:440px;font-style:italic;font-family:'DM Serif Display',serif;}
  .header-btns{display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;}
  .add-category-btn{background:rgba(255,255,255,0.08);color:var(--white);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:9px 18px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all 0.12s;}
  .add-category-btn:hover{background:rgba(255,255,255,0.14);}
  .refresh-btn-hdr{background:none;color:#7a7068;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:9px 18px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.12s;}
  .refresh-btn-hdr:hover{color:var(--sage-light);border-color:rgba(255,255,255,0.2);}

  .toc{background:var(--cream);border-bottom:1px solid var(--border);padding:16px 48px;display:flex;flex-wrap:wrap;gap:6px 16px;align-items:center;}
  .toc-label{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-muted);margin-right:4px;}
  .toc-link{font-size:12px;color:var(--ink);text-decoration:none;padding:4px 12px;border:1px solid var(--border);border-radius:100px;transition:all 0.12s;white-space:nowrap;background:var(--white);}
  .toc-link:hover{background:var(--ink);color:var(--white);border-color:var(--ink);}

  .search-bar{padding:20px 48px;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;}
  .search-input{flex:1;max-width:480px;padding:10px 16px;border:1px solid var(--border);border-radius:100px;background:var(--cream);color:var(--ink);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
  .search-input:focus{border-color:var(--sage-mid);background:var(--white);}
  .search-count{font-size:13px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;}

  main{max-width:860px;margin:0 auto;padding:48px 48px 100px;}

  .hook-section{margin-bottom:64px;scroll-margin-top:32px;}
  .section-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid var(--ink);}
  .section-emoji{font-size:26px;}
  .section-title-text{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:0.02em;line-height:1;flex:1;}
  .section-count{font-size:12px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;}
  .section-actions{display:flex;gap:6px;margin-left:auto;}
  .icon-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;transition:all 0.12s;}
  .icon-btn:hover{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .icon-btn.danger:hover{background:#8a2a2a;border-color:#8a2a2a;}

  .hooks-list{display:flex;flex-direction:column;gap:10px;}
  .hook-card{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start;transition:all 0.12s;position:relative;}
  .hook-card:hover{border-color:var(--sage-mid);background:var(--white);transform:translateX(3px);}
  .hook-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--tan);min-width:26px;line-height:1;margin-top:2px;}
  .hook-text{font-size:14px;line-height:1.6;color:var(--ink-mid);flex:1;}
  .hook-card-btns{display:flex;gap:4px;opacity:0;transition:opacity 0.12s;flex-shrink:0;}
  .hook-card:hover .hook-card-btns{opacity:1;}
  .hook-action{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;transition:all 0.12s;white-space:nowrap;}
  .hook-action:hover{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .hook-action.copy-btn.copied{background:#2d8a4e;color:white;border-color:#2d8a4e;opacity:1;}
  .hook-action.del:hover{background:#8a2a2a;border-color:#8a2a2a;}
  .add-hook-btn{width:100%;margin-top:8px;background:none;border:1px dashed var(--border);border-radius:8px;padding:12px;font-size:13px;color:var(--ink-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;text-align:center;}
  .add-hook-btn:hover{border-color:var(--sage-mid);color:var(--sage);background:var(--cream);}

  .loading-state{text-align:center;padding:60px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;}
  .loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(46,42,36,0.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.15);max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;margin-bottom:18px;color:var(--ink);}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:11px;font-weight:500;color:var(--ink-mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;}
  .form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--cream);color:var(--ink);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.12s;}
  .form-textarea{resize:vertical;min-height:90px;line-height:1.5;}
  .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--sage-mid);background:var(--white);}
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .btn-cancel{flex:1;background:none;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;}
  .btn-cancel:hover{background:var(--cream);}
  .btn-save{flex:2;background:var(--sage);border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:white;font-family:'DM Sans',sans-serif;font-weight:500;}
  .btn-save:hover{background:var(--sage-mid);}
  .btn-save:disabled{opacity:0.6;cursor:not-allowed;}
  .form-msg{font-size:12px;margin-top:10px;text-align:center;font-style:italic;font-family:'DM Serif Display',serif;min-height:18px;}
  .form-msg.success{color:var(--sage);}
  .form-msg.error{color:var(--tan-dark);}

  .toast{position:fixed;bottom:28px;right:28px;background:var(--ink);color:var(--white);padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transform:translateY(12px);transition:all 0.18s;pointer-events:none;z-index:999;}
  .toast.show{opacity:1;transform:translateY(0);}

  @media(max-width:640px){header{padding:28px 20px 24px;}.toc{padding:12px 20px;}.search-bar{padding:14px 20px;}main{padding:28px 20px 80px;}}
</style>
</head>
<body>
<a href="index.html" style="position:fixed;bottom:24px;right:24px;z-index:999;background:#2e2a24;color:#faf7f2;text-decoration:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 18px;border-radius:100px;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:background 0.12s;" onmouseover="this.style.background='#6b7a5a'" onmouseout="this.style.background='#2e2a24'">← Home</a>

<header>
  <div class="header-label">Content Strategy Resource</div>
  <h1>Hooks<br><span>that</span><br>print</h1>
  <p>Your reusable hook library — synced across all devices via Notion.</p>
  <div class="header-btns">
    <button class="add-category-btn" onclick="openCategoryModal()">+ Add Category</button>
    <button class="refresh-btn-hdr" onclick="loadFromNotion()">↻ Refresh</button>
  </div>
</header>

<nav class="toc" id="toc"></nav>

<div class="search-bar">
  <input type="text" class="search-input" id="search-input" placeholder="Search hooks..." oninput="renderAll()">
  <span class="search-count" id="search-count"></span>
</div>

<main id="main-content">
  <div class="loading-state"><div class="loading-spinner"></div>Loading from Notion...</div>
</main>

<div class="toast" id="toast"></div>

<!-- HOOK MODAL -->
<div class="modal-overlay" id="hook-modal">
  <div class="modal">
    <div class="modal-title" id="hook-modal-title">Add Hook</div>
    <div class="form-group">
      <label class="form-label">Hook Text</label>
      <textarea class="form-textarea" id="hook-text" placeholder="Write your hook here..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Category</label>
      <select class="form-select" id="hook-category"></select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeHookModal()">Cancel</button>
      <button class="btn-save" id="hook-save-btn" onclick="saveHook()">Save Hook</button>
    </div>
    <div class="form-msg" id="hook-form-msg"></div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <div class="modal-title" id="cat-modal-title">Add Category</div>
    <div class="form-group">
      <label class="form-label">Category Name</label>
      <input type="text" class="form-input" id="cat-name" placeholder="e.g. Impulse Buy Hooks">
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input type="text" class="form-input" id="cat-emoji" placeholder="e.g. 🛒" maxlength="4">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCatModal()">Cancel</button>
      <button class="btn-save" id="cat-save-btn" onclick="saveCategory()">Save Category</button>
    </div>
    <div class="form-msg" id="cat-form-msg"></div>
  </div>
</div>

<script>
const API = 'https://kortny-api.vercel.app/api/notion';
const HOOKS_DB = '18bbb9e6ad7241be9c4b5dfac1bb8fcc';

let HOOKS = []; // [{notionId, text, catId, catName, catEmoji}]
let CATEGORIES = []; // [{id, name, emoji}]
let editingHookId = null;

async function loadFromNotion() {
  document.getElementById('main-content').innerHTML = '<div class="loading-state"><div class="loading-spinner"></div>Loading from Notion...</div>';
  try {
    let results = [], cursor = null;
    do {
      const body = {page_size:100};
      if(cursor) body.start_cursor = cursor;
      const res = await fetch(`${API}?endpoint=databases/${HOOKS_DB}/query`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
      });
      const data = await res.json();
      results = [...results, ...(data.results||[])];
      cursor = data.next_cursor;
    } while(cursor);

    HOOKS = results.map(p => ({
      notionId: p.id,
      text: p.properties['Hook Text']?.title?.[0]?.plain_text || '',
      catId: p.properties['Category ID']?.rich_text?.[0]?.plain_text || '',
      catName: p.properties.Category?.rich_text?.[0]?.plain_text || '',
      catEmoji: p.properties['Category Emoji']?.rich_text?.[0]?.plain_text || '🎣',
    })).filter(h => h.text);

    // Build categories from hooks
    const catMap = {};
    HOOKS.forEach(h => {
      if(h.catId && !catMap[h.catId]) {
        catMap[h.catId] = {id:h.catId, name:h.catName, emoji:h.catEmoji};
      }
    });
    CATEGORIES = Object.values(catMap);

    // Also sync to localStorage for script generator / todo page
    syncToLocalStorage();
    renderAll();
  } catch(e) {
    console.error(e);
    document.getElementById('main-content').innerHTML = '<div class="loading-state">Error loading. Try refreshing.</div>';
  }
}

function syncToLocalStorage() {
  const data = {
    categories: CATEGORIES.map(c => ({id:c.id, name:c.name, emoji:c.emoji})),
    hooks: HOOKS.map(h => ({id:h.notionId, catId:h.catId, text:h.text}))
  };
  localStorage.setItem('kortny-hooks-v2', JSON.stringify(data));
}

function buildTOC() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const toc = document.getElementById('toc');
  toc.innerHTML = '<span class="toc-label">Jump to</span>';
  CATEGORIES.forEach(cat => {
    const hooks = HOOKS.filter(h => h.catId === cat.id);
    if(search && !hooks.some(h => h.text.toLowerCase().includes(search))) return;
    const a = document.createElement('a');
    a.href = '#cat-'+cat.id;
    a.className = 'toc-link';
    a.textContent = cat.emoji+' '+cat.name;
    toc.appendChild(a);
  });
}

function renderAll() {
  const search = document.getElementById('search-input').value.toLowerCase();
  buildTOC();
  const main = document.getElementById('main-content');
  let html = '';
  let totalVisible = 0;

  CATEGORIES.forEach(cat => {
    let hooks = HOOKS.filter(h => h.catId === cat.id);
    if(search) hooks = hooks.filter(h => h.text.toLowerCase().includes(search));
    if(search && hooks.length === 0) return;
    totalVisible += hooks.length;

    html += `<div class="hook-section" id="cat-${cat.id}">
      <div class="section-header">
        <span class="section-emoji">${cat.emoji}</span>
        <span class="section-title-text">${cat.name}</span>
        <span class="section-count">${hooks.length} hooks</span>
        <div class="section-actions">
          <button class="icon-btn" onclick="openHookModal(null,'${cat.id}')">+ Add</button>
          <button class="icon-btn" onclick="editCat('${cat.id}')">✎</button>
          <button class="icon-btn danger" onclick="deleteCat('${cat.id}')">✕</button>
        </div>
      </div>
      <div class="hooks-list">`;

    hooks.forEach((h,i) => {
      html += `<div class="hook-card">
        <span class="hook-num">${i+1}</span>
        <p class="hook-text">${h.text}</p>
        <div class="hook-card-btns">
          <button class="hook-action copy-btn" onclick="copyHook(this,'${h.notionId}')">Copy</button>
          <button class="hook-action" onclick="openHookModal('${h.notionId}','${cat.id}')">✎</button>
          <button class="hook-action del" onclick="deleteHook('${h.notionId}')">✕</button>
        </div>
      </div>`;
    });

    html += `</div>
      <button class="add-hook-btn" onclick="openHookModal(null,'${cat.id}')">+ Add hook to ${cat.name}</button>
    </div>`;
  });

  if(!html) html = '<p style="text-align:center;padding:60px;color:var(--ink-muted);font-style:italic;font-family:DM Serif Display,serif">No hooks match your search</p>';
  main.innerHTML = html;
  document.getElementById('search-count').textContent = search ? totalVisible+' hooks found' : HOOKS.length+' hooks total';
}

// HOOK MODAL
function openHookModal(hookNotionId, catId) {
  editingHookId = hookNotionId;
  const sel = document.getElementById('hook-category');
  sel.innerHTML = CATEGORIES.map(c => `<option value="${c.id}">${c.emoji} ${c.name}</option>`).join('');
  if(hookNotionId) {
    const h = HOOKS.find(x => x.notionId === hookNotionId);
    document.getElementById('hook-modal-title').textContent = 'Edit Hook';
    document.getElementById('hook-text').value = h.text;
    sel.value = h.catId;
  } else {
    document.getElementById('hook-modal-title').textContent = 'Add Hook';
    document.getElementById('hook-text').value = '';
    sel.value = catId || CATEGORIES[0]?.id;
  }
  document.getElementById('hook-form-msg').textContent = '';
  document.getElementById('hook-save-btn').disabled = false;
  document.getElementById('hook-save-btn').textContent = hookNotionId ? 'Save Changes' : 'Save Hook';
  document.getElementById('hook-modal').classList.add('open');
}
function closeHookModal(){document.getElementById('hook-modal').classList.remove('open');}

async function saveHook() {
  const text = document.getElementById('hook-text').value.trim();
  const catId = document.getElementById('hook-category').value;
  const cat = CATEGORIES.find(c => c.id === catId);
  if(!text){showFormMsg('hook','Please enter a hook.','error');return;}

  const btn = document.getElementById('hook-save-btn');
  btn.disabled=true; btn.textContent='Saving...';

  const properties = {
    'Hook Text': {title:[{text:{content:text}}]},
    'Category': {rich_text:[{text:{content:cat?.name||''}}]},
    'Category Emoji': {rich_text:[{text:{content:cat?.emoji||'🎣'}}]},
    'Category ID': {rich_text:[{text:{content:catId}}]},
  };

  try {
    let res;
    if(editingHookId) {
      res = await fetch(`${API}?endpoint=pages/${editingHookId}`, {
        method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({properties})
      });
      if(res.ok) {
        const h = HOOKS.find(x=>x.notionId===editingHookId);
        if(h){h.text=text;h.catId=catId;h.catName=cat?.name||'';h.catEmoji=cat?.emoji||'🎣';}
      }
    } else {
      res = await fetch(`${API}?endpoint=pages`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({parent:{database_id:HOOKS_DB},properties})
      });
      if(res.ok) {
        const data = await res.json();
        HOOKS.push({notionId:data.id,text,catId,catName:cat?.name||'',catEmoji:cat?.emoji||'🎣'});
      }
    }
    if(res.ok) {
      syncToLocalStorage(); renderAll(); closeHookModal();
      showToast(editingHookId?'Hook updated!':'Hook added!');
    } else {
      showFormMsg('hook','Error saving. Try again.','error');
      btn.disabled=false; btn.textContent='Save Hook';
    }
  } catch(e) {
    showFormMsg('hook','Network error.','error');
    btn.disabled=false; btn.textContent='Save Hook';
  }
}

async function deleteHook(notionId) {
  if(!confirm('Delete this hook?'))return;
  try {
    await fetch(`${API}?endpoint=pages/${notionId}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({archived:true})
    });
    HOOKS = HOOKS.filter(h=>h.notionId!==notionId);
    syncToLocalStorage(); renderAll();
    showToast('Hook deleted');
  } catch(e){ showToast('Error deleting'); }
}

// CATEGORY MODAL
function openCategoryModal() {
  document.getElementById('cat-modal-title').textContent = 'Add Category';
  document.getElementById('cat-name').value = '';
  document.getElementById('cat-emoji').value = '';
  document.getElementById('cat-form-msg').textContent = '';
  document.getElementById('cat-save-btn').disabled = false;
  document.getElementById('cat-save-btn').textContent = 'Save Category';
  document.getElementById('cat-modal').classList.add('open');
}
function editCat(id) {
  const cat = CATEGORIES.find(c=>c.id===id);
  document.getElementById('cat-modal-title').textContent = 'Edit Category';
  document.getElementById('cat-name').value = cat.name;
  document.getElementById('cat-emoji').value = cat.emoji;
  document.getElementById('cat-form-msg').textContent = '';
  document.getElementById('cat-save-btn').disabled = false;
  document.getElementById('cat-save-btn').textContent = 'Save Changes';
  document.getElementById('cat-modal').classList.add('open');
  // Store editing cat id
  document.getElementById('cat-modal').dataset.editingCat = id;
}
function closeCatModal(){
  document.getElementById('cat-modal').classList.remove('open');
  delete document.getElementById('cat-modal').dataset.editingCat;
}

async function saveCategory() {
  const name = document.getElementById('cat-name').value.trim();
  const emoji = document.getElementById('cat-emoji').value.trim() || '📌';
  const editingCatId = document.getElementById('cat-modal').dataset.editingCat;
  if(!name){showFormMsg('cat','Please enter a name.','error');return;}

  const btn = document.getElementById('cat-save-btn');
  btn.disabled=true; btn.textContent='Saving...';

  if(editingCatId) {
    // Update all hooks in this category in Notion
    const catHooks = HOOKS.filter(h=>h.catId===editingCatId);
    for(const h of catHooks) {
      await fetch(`${API}?endpoint=pages/${h.notionId}`, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({properties:{
          'Category':{rich_text:[{text:{content:name}}]},
          'Category Emoji':{rich_text:[{text:{content:emoji}}]},
        }})
      });
      h.catName=name; h.catEmoji=emoji;
    }
    const cat = CATEGORIES.find(c=>c.id===editingCatId);
    if(cat){cat.name=name;cat.emoji=emoji;}
    syncToLocalStorage(); renderAll(); closeCatModal();
    showToast('Category updated!');
  } else {
    const newId = 'cat-'+Date.now();
    CATEGORIES.push({id:newId,name,emoji});
    syncToLocalStorage(); renderAll(); closeCatModal();
    showToast('Category added!');
    btn.disabled=false;
  }
}

async function deleteCat(id) {
  const cat = CATEGORIES.find(c=>c.id===id);
  const hookCount = HOOKS.filter(h=>h.catId===id).length;
  if(!confirm(`Delete "${cat.name}" and its ${hookCount} hooks?`))return;

  const catHooks = HOOKS.filter(h=>h.catId===id);
  for(const h of catHooks) {
    await fetch(`${API}?endpoint=pages/${h.notionId}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({archived:true})
    });
  }
  HOOKS = HOOKS.filter(h=>h.catId!==id);
  CATEGORIES = CATEGORIES.filter(c=>c.id!==id);
  syncToLocalStorage(); renderAll();
  showToast('Category deleted');
}

function copyHook(btn, notionId) {
  const h = HOOKS.find(x=>x.notionId===notionId);
  navigator.clipboard.writeText(h.text).then(()=>{
    btn.textContent='✓'; btn.classList.add('copied');
    showToast('Copied!');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
  });
}

function showFormMsg(type,msg,cls) {
  const el=document.getElementById(type+'-form-msg');
  el.textContent=msg; el.className='form-msg '+cls;
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

document.getElementById('hook-modal').addEventListener('click',function(e){if(e.target===this)closeHookModal();});
document.getElementById('cat-modal').addEventListener('click',function(e){if(e.target===this)closeCatModal();});

loadFromNotion();
</script>
