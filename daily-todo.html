<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily To Do</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:#6b7a5a;--sage-mid:#8a9a6e;--sage-light:#c5d4a8;
    --tan:#c9a87a;--tan-dark:#9b6e3a;
    --cream:#f4ede0;--cream-dark:#e8dcc8;
    --ink:#2e2a24;--ink-mid:#5a5248;--ink-muted:#8a8078;
    --border:rgba(107,122,90,0.15);--white:#faf7f2;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;}
  header{background:var(--ink);padding:28px 36px 22px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--tan);margin-bottom:4px;font-weight:500;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:0.9;color:var(--white);}
  header h1 span{color:var(--sage-light);}
  .header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .header-date{font-size:13px;color:#7a7068;font-style:italic;font-family:'DM Serif Display',serif;}
  .restart-btn{background:rgba(180,60,60,0.15);color:#d4604a;border:1px solid rgba(180,60,60,0.2);border-radius:8px;padding:8px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}
  .restart-btn:hover{background:rgba(180,60,60,0.25);}
  .add-products-btn{background:var(--sage);color:white;border:none;border-radius:8px;padding:10px 18px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}
  .add-products-btn:hover{background:var(--sage-mid);}
  .progress-bar-wrap{background:rgba(255,255,255,0.06);height:4px;}
  .progress-bar-fill{background:var(--sage-light);height:4px;transition:width 0.4s ease;}
  .main{max-width:800px;margin:0 auto;padding:28px 24px 80px;}
  .empty-state{text-align:center;padding:80px 20px;}
  .empty-emoji{font-size:56px;margin-bottom:16px;}
  .empty-title{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--ink-mid);margin-bottom:8px;letter-spacing:0.03em;}
  .empty-sub{font-size:14px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;margin-bottom:28px;}
  .empty-btn{background:var(--sage);color:white;border:none;border-radius:10px;padding:14px 28px;font-size:15px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}
  .progress-section{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .progress-label{font-size:13px;color:var(--ink-mid);}
  .progress-label strong{color:var(--ink);}
  .progress-pills{display:flex;gap:6px;flex-wrap:wrap;}
  .ppill{font-size:12px;font-weight:500;padding:3px 10px;border-radius:100px;}
  .ppill-done{background:rgba(107,122,90,0.15);color:#3a5228;}
  .ppill-left{background:var(--cream-dark);color:var(--ink-muted);}
  .product-cards{display:flex;flex-direction:column;gap:20px;}
  .product-card{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
  .card-header{background:var(--ink);padding:16px 20px;display:flex;align-items:center;gap:14px;}
  .card-header-left{flex:1;min-width:0;}
  .card-product-name{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);letter-spacing:0.02em;line-height:1;}
  .card-product-meta{font-size:12px;color:#7a7068;margin-top:3px;display:flex;gap:10px;}
  .card-header-btns{display:flex;gap:6px;flex-shrink:0;}
  .hbtn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;color:#a09888;font-family:'DM Sans',sans-serif;transition:all 0.12s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;}
  .hbtn:hover{background:rgba(255,255,255,0.16);color:var(--white);}
  .hbtn.remove{background:rgba(180,60,60,0.2);color:#d4604a;border-color:rgba(180,60,60,0.25);}
  .hbtn.remove:hover{background:rgba(180,60,60,0.35);}
  .card-script{padding:16px 20px;border-bottom:1px solid var(--border);}
  .script-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);font-weight:500;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
  .script-text{background:var(--cream);border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.7;color:var(--ink-mid);border-left:3px solid var(--sage);position:relative;}
  .script-action-btns{position:absolute;top:8px;right:8px;display:flex;gap:4px;}
  .copy-btn-small{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;}
  .copy-btn-small:hover{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .edit-btn-small{background:none;border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;}
  .edit-btn-small:hover{background:var(--sage);color:var(--white);border-color:var(--sage);}
  .script-textarea{width:100%;padding:14px 16px;padding-right:80px;border:none;border-radius:8px;background:var(--cream);color:var(--ink-mid);font-size:13px;line-height:1.7;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;min-height:120px;border-left:3px solid var(--tan);}
  .script-textarea:focus{background:var(--white);border-left-color:var(--sage);}
  .save-btn-small{background:var(--sage);border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:white;font-family:'DM Sans',sans-serif;}
  .save-btn-small:hover{background:var(--sage-mid);}
  .no-script{font-size:13px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;}
  .gen-script-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;transition:all 0.12s;}
  .gen-script-btn:hover{background:var(--sage);color:white;border-color:var(--sage);}
  .takes-section{padding:16px 20px;}
  .takes-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);font-weight:500;margin-bottom:12px;}
  .takes-list{display:flex;flex-direction:column;gap:10px;}
  .take-row{background:var(--cream);border-radius:10px;border:1px solid var(--border);padding:14px 16px;}
  .take-row.take-done{opacity:0.55;border-style:dashed;}
  .take-row.take-logged{opacity:0.45;border-style:dashed;}
  .take-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .take-num{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--tan-dark);line-height:1;flex-shrink:0;width:24px;}
  .take-hook-display{flex:1;font-size:13px;color:var(--ink-mid);line-height:1.4;min-width:0;}
  .take-hook-display.no-hook{color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;}
  .take-btns{display:flex;gap:5px;flex-shrink:0;}
  .tbtn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;transition:all 0.12s;white-space:nowrap;}
  .tbtn:hover{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .tbtn.done-btn{background:rgba(107,122,90,0.2);color:#3a5228;border-color:rgba(107,122,90,0.3);}
  .tbtn.log-btn{background:rgba(107,122,90,0.08);color:var(--sage);border-color:rgba(107,122,90,0.2);}
  .tbtn.logged{background:rgba(107,122,90,0.3);color:#3a5228;border-color:rgba(107,122,90,0.4);cursor:default;}
  .tbtn.del:hover{background:rgba(180,60,60,0.15);color:#d4604a;border-color:rgba(180,60,60,0.2);}
  .tbtn:disabled{opacity:0.5;cursor:not-allowed;}
  .take-log-form{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .take-log-input,.take-log-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;background:var(--white);color:var(--ink);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;}
  .take-log-input:focus,.take-log-select:focus{border-color:var(--sage-mid);}
  .take-log-submit{background:var(--sage);color:white;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;grid-column:1/-1;}
  .take-log-submit:hover{background:var(--sage-mid);}
  .take-log-msg{font-size:11px;font-style:italic;font-family:'DM Serif Display',serif;grid-column:1/-1;}
  .take-log-msg.success{color:var(--sage);}
  .take-log-msg.error{color:var(--tan-dark);}
  .add-take-btn{width:100%;margin-top:10px;background:none;border:1px dashed var(--border);border-radius:8px;padding:10px;font-size:13px;color:var(--ink-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;text-align:center;}
  .add-take-btn:hover{border-color:var(--sage-mid);color:var(--sage);background:rgba(107,122,90,0.04);}
  .saving-indicator{font-size:11px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;padding:4px 8px;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(46,42,36,0.55);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:24px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;margin-bottom:4px;color:var(--ink);}
  .modal-sub{font-size:13px;color:var(--ink-muted);margin-bottom:14px;font-style:italic;font-family:'DM Serif Display',serif;}
  .modal-search{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--cream);color:var(--ink);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;margin-bottom:12px;}
  .modal-search:focus{border-color:var(--sage-mid);background:var(--white);}
  .hook-list{display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;}
  .hook-item{padding:10px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;color:var(--ink-mid);line-height:1.5;transition:all 0.12s;background:var(--cream);}
  .hook-item:hover{border-color:var(--sage-mid);background:var(--white);}
  .hook-item-cat{font-size:10px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
  .modal-close{width:100%;margin-top:14px;background:none;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;}
  .modal-close:hover{background:var(--cream);}
  .picker-list{display:flex;flex-direction:column;gap:6px;max-height:320px;overflow-y:auto;}
  .picker-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:all 0.12s;background:var(--cream);}
  .picker-item:hover{border-color:var(--sage-mid);background:var(--white);}
  .picker-item.selected{background:rgba(107,122,90,0.1);border-color:var(--sage);}
  .picker-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all 0.12s;}
  .picker-item.selected .picker-check{background:var(--sage);border-color:var(--sage);color:white;}
  .picker-name{font-size:13px;font-weight:500;color:var(--ink);}
  .picker-meta{font-size:11px;color:var(--ink-muted);margin-top:1px;}
  .modal-actions{display:flex;gap:8px;margin-top:14px;}
  .btn-cancel{flex:1;background:none;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;}
  .btn-add{flex:2;background:var(--sage);border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:white;font-family:'DM Sans',sans-serif;font-weight:500;}
  .angle-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .abtn{background:var(--cream);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;transition:all 0.12s;}
  .abtn.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .custom-angle-wrap{position:relative;margin-bottom:12px;}
  .custom-angle-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--cream);color:var(--ink);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.12s;}
  .custom-angle-input:focus{border-color:var(--sage-mid);background:var(--white);}
  .custom-angle-input.has-value{border-color:var(--sage);background:rgba(107,122,90,0.06);}
  .form-textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--cream);color:var(--ink);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:vertical;min-height:70px;line-height:1.5;}
  .form-textarea:focus{border-color:var(--sage-mid);background:var(--white);}
  .gen-btn{flex:2;background:var(--sage);border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:white;font-family:'DM Sans',sans-serif;font-weight:500;}
  .gen-btn:disabled{opacity:0.6;cursor:not-allowed;}
  .loading-spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:640px){header{padding:20px;}.main{padding:16px 12px 60px;}.card-header{flex-wrap:wrap;}.take-log-form{grid-template-columns:1fr;}}
</style>

      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")

      });

</head>

<a href="index.html" style="position:fixed;bottom:24px;right:24px;z-index:999;background:#2e2a24;color:#faf7f2;text-decoration:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 18px;border-radius:100px;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:background 0.12s;" onmouseover="this.style.background='#6b7a5a'" onmouseout="this.style.background='#2e2a24'">← Home</a>

<header>
  <div>
    <div class="eyebrow">@helloitskortny</div>
    <h1>Daily<br><span>To Do</span></h1>
  </div>
  <div class="header-right">
    <div class="header-date" id="header-date"></div>
    <button class="restart-btn" onclick="restartDay()">↺ Restart</button>
    <button class="add-products-btn" onclick="openPicker()">+ Add Products</button>
  </div>
</header>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>

<div class="main" id="main-content">
  <div style="text-align:center;padding:60px">
    <div class="loading-spinner"></div>
    <div style="margin-top:12px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif">Loading today's queue...</div>
  </div>
</div>

<!-- PRODUCT PICKER -->
<div class="modal-overlay" id="picker-modal">
  <div class="modal">
    <div class="modal-title">Add Products</div>
    <div class="modal-sub">Pick what you're filming today</div>
    <input type="text" class="modal-search" id="picker-search" placeholder="Search products..." oninput="filterPicker()">
    <div class="picker-list" id="picker-list"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePicker()">Cancel</button>
      <button class="btn-add" id="picker-add-btn" onclick="addSelectedProducts()">Add to Today</button>
    </div>
  </div>
</div>

<!-- HOOK PICKER -->
<div class="modal-overlay" id="hook-modal">
  <div class="modal">
    <div class="modal-title">Pick a Hook</div>
    <div class="modal-sub" id="hook-modal-sub">Choose a hook for this take</div>
    <input type="text" class="modal-search" id="hook-search" placeholder="Search hooks..." oninput="filterHooks()">
    <div class="hook-list" id="hook-list"></div>
    <button class="modal-close" onclick="closeHookModal()">Cancel</button>
  </div>
</div>

<!-- SCRIPT MODAL -->
<div class="modal-overlay" id="script-modal">
  <div class="modal">
    <div class="modal-title" id="script-modal-title">Generate Script</div>
    <div style="margin-bottom:4px">
      <div style="font-size:11px;font-weight:500;color:var(--ink-mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px">Script Angle</div>
      <div class="angle-row" id="angle-row">
        <button class="abtn active" onclick="setAngle('story',this)">Story</button>
        <button class="abtn" onclick="setAngle('curiosity',this)">Curiosity</button>
        <button class="abtn" onclick="setAngle('rage bait',this)">Rage Bait</button>
        <button class="abtn" onclick="setAngle('skit',this)">Skit</button>
        <button class="abtn" onclick="setAngle('emotional',this)">Emotional</button>
        <button class="abtn" onclick="setAngle('fear',this)">Fear</button>
        <button class="abtn" onclick="setAngle('asmr',this)">ASMR</button>
        <button class="abtn" onclick="setAngle('identity',this)">Identity</button>
      </div>
      <div class="custom-angle-wrap">
        <input type="text" class="custom-angle-input" id="custom-angle" placeholder="Or type a custom angle… e.g. 'husband reaction skit'" oninput="onCustomAngle(this)">
      </div>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:500;color:var(--ink-mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px">Extra details (optional)</div>
      <textarea class="form-textarea" id="script-details" placeholder="Anything specific to include..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeScriptModal()">Cancel</button>
      <button class="gen-btn" id="gen-btn" onclick="generateScript()">✦ Generate</button>
    </div>
    <div id="script-msg" style="font-size:12px;margin-top:8px;text-align:center;font-style:italic;font-family:'DM Serif Display',serif;color:var(--ink-muted);min-height:18px"></div>
  </div>
</div>

<script>
const API = 'https://kortny-api.vercel.app/api/notion';
const PRODUCTS_DB = 'd99b6dec79ba46f1a564af4d00f7220d';
const VIDEO_DB = '148a99ff772d437f91316d20a5526ffa';
const TODO_DB = '7b6af2e38d1f49ac904506332061b77f';
const HOOKS_KEY = 'kortny-hooks-v2';

const today = new Date();
const todayKey = today.toISOString().split('T')[0];
document.getElementById('header-date').textContent = today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

let ALL_PRODUCTS = [];
let HOOKS = [];
let TODO = [];
let pickerSelected = new Set();
let hookTargetId = null;
let scriptTargetCardId = null;
let scriptAngle = 'story';

async function init() {
  loadHooks();
  await Promise.all([loadProducts(), loadTodoFromNotion()]);
  render();
}

function loadHooks() {
  try {
    const saved = localStorage.getItem(HOOKS_KEY);
    if(saved){
      const data = JSON.parse(saved);
      const cats={};
      (data.categories||[]).forEach(c=>{cats[c.id]=c;});
      HOOKS=(data.hooks||[]).filter(h=>!h.isNote&&!h.isVisual).map(h=>({...h,catName:cats[h.catId]?.name||'',catEmoji:cats[h.catId]?.emoji||''}));
    }
  } catch(e){}
  if(!HOOKS.length) HOOKS=[
    {id:'dh1',catName:"Husband's GF",catEmoji:'💍',text:"My husband's girlfriend recommended this brand to me and honestly she has great taste so here we are."},
    {id:'dh2',catName:'Chaos Energy',catEmoji:'🌀',text:"My therapist told me to stop buying things online but then I found this."},
    {id:'dh3',catName:'Chaos Energy',catEmoji:'🌀',text:"I saw these, blacked out, and woke up with a tracking number."},
    {id:'dh4',catName:'Partner Reaction',catEmoji:'😂',text:"My husband asked what these are for and I said 'happiness' and walked away."},
    {id:'dh5',catName:'Impulse Buy',catEmoji:'🛒',text:"My name is Kortny and I cannot be trusted on TikTok Shop after 9pm."},
    {id:'dh6',catName:'Impulse Buy',catEmoji:'🛒',text:"POV you told yourself you were just browsing."},
    {id:'dh7',catName:'Home Rage Bait',catEmoji:'🏠',text:"Ugly homes are a personality flaw and I said what I said."},

async function loadProducts() {
  try {
    let results=[],cursor=null;
    do {
      const body={page_size:100,sorts:[{property:'Product',direction:'ascending'}]};
      if(cursor)body.start_cursor=cursor;
      const res=await fetch(`${API}?endpoint=databases/${PRODUCTS_DB}/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data=await res.json();
      results=[...results,...(data.results||[])];
      cursor=data.next_cursor;
    } while(cursor);
    ALL_PRODUCTS=results.filter(p=>!p.archived&&!p.in_trash&&p.properties.Product?.title?.[0]?.plain_text).map(p=>({
      id:p.id,
      name:p.properties.Product?.title?.[0]?.plain_text||'',
      brand:p.properties.Brand?.select?.name||'',
      stock:p.properties.Stock?.select?.name||'',
      features:p.properties.Features?.rich_text?.[0]?.plain_text||'',
      link:p.properties['TikTok Shop Link']?.url||'',
    })).filter(p=>p.name);
  } catch(e){console.error(e);}
}

async function loadTodoFromNotion() {
  try {
    const res = await fetch(`${API}?endpoint=databases/${TODO_DB}/query`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        page_size:100,
        filter:{property:'Date',date:{equals:todayKey}},
        sorts:[{property:'Take Number',direction:'ascending'}]
      })
    });
    const data = await res.json();
    const pages = data.results || [];

    const cardMap = {};
    pages.forEach(p => {
      const productId = p.properties['Product ID']?.rich_text?.[0]?.plain_text || '';
      const productName = p.properties['Product Name']?.title?.[0]?.plain_text || '';
      const brand = p.properties.Brand?.rich_text?.[0]?.plain_text || '';
      const link = p.properties['Shop Link']?.url || '';
      const script = p.properties.Script?.rich_text?.[0]?.plain_text || '';
      const hook = p.properties.Hook?.rich_text?.[0]?.plain_text || '';
      const done = p.properties.Done?.checkbox || false;
      const logged = p.properties['Logged to Tracker']?.checkbox || false;
      const takeNum = p.properties['Take Number']?.number || 1;

      const cardKey = productId || productName;
      if(!cardMap[cardKey]) {
        cardMap[cardKey] = {
          id: 'card-'+cardKey,
          notionCardId: null,
          productId, productName, brand, link,
          script,
          takes: []
        };
      }
      if(script && !cardMap[cardKey].script) cardMap[cardKey].script = script;

      cardMap[cardKey].takes.push({
        id: 'take-'+p.id,
        notionId: p.id,
        hookText: hook,
        hookId: null,
        done, logged,
        showLog: false,
        takeNum
      });
    });

    TODO = Object.values(cardMap);
  } catch(e) { console.error(e); TODO = []; }
}

function uid(){return 'id-'+Date.now()+'-'+Math.random().toString(36).slice(2,7);}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const main=document.getElementById('main-content');
  const allTakes=TODO.flatMap(c=>c.takes||[]);
  const doneTakes=allTakes.filter(t=>t.done).length;
  const totalTakes=allTakes.length;
  document.getElementById('progress-bar').style.width=totalTakes?(doneTakes/totalTakes*100)+'%':'0%';

  if(!TODO.length){
    main.innerHTML=`<div class="empty-state">
      <div class="empty-emoji">🎬</div>
      <div class="empty-title">What are you filming today?</div>
      <div class="empty-sub">Add products to build your queue</div>
      <button class="empty-btn" onclick="openPicker()">+ Add Products</button>
    </div>`;
    return;
  }

  let html=`<div class="progress-section">
    <div class="progress-label"><strong>${doneTakes}/${totalTakes}</strong> takes done today</div>
    <div class="progress-pills">
      <span class="ppill ppill-done">${doneTakes} filmed</span>
      <span class="ppill ppill-left">${totalTakes-doneTakes} remaining</span>
    </div>
  </div><div class="product-cards">`;

  TODO.forEach(card=>{
    const takes=card.takes||[];
    html+=`<div class="product-card" id="card-${card.id}">
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-product-name">${card.productName}</div>
          <div class="card-product-meta">
            ${card.brand?`<span>${card.brand}</span>`:''}
            <span>${takes.length} take${takes.length!==1?'s':''} · ${takes.filter(t=>t.done).length} done</span>
          </div>
        </div>
        <div class="card-header-btns">
          ${card.link?`<a href="${card.link}" target="_blank" class="hbtn">Shop ↗</a>`:''}
          <button class="hbtn" onclick="openScriptModal('${card.id}')">✦ Script</button>
          <button class="hbtn remove" onclick="removeCard('${card.id}')">✕ Remove</button>
        </div>
      </div>`;

    html+=`<div class="card-script">
      <div class="script-label">
        <span>📝 Script</span>
        <button class="gen-script-btn" onclick="openScriptModal('${card.id}')">✦ ${card.script?'Regenerate':'Generate'}</button>
      </div>`;
    if(card.script){
      if(card.editing){
        html+=`<div class="script-text" style="padding:0;background:none;border:none;">
          <textarea class="script-textarea" id="script-edit-${card.id}">${card.script}</textarea>
          <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:6px;">
            <button class="edit-btn-small js-cancel-edit" data-card-id="${card.id}">Cancel</button>
            <button class="save-btn-small js-save-edit" data-card-id="${card.id}">Save</button>
          </div>
        </div>`;
      } else {
        html+=`<div class="script-text">
          <div class="script-action-btns">
            <button class="edit-btn-small js-start-edit" data-card-id="${card.id}">Edit</button>
            <button class="copy-btn-small js-copy-script" data-card-id="${card.id}">Copy</button>
          </div>
          ${card.script.replace(/\n/g,'<br>')}
        </div>`;
      }
    } else {
      html+=`<div class="no-script">No script yet — click ✦ Generate above</div>`;
    }
    html+=`</div>`;

    html+=`<div class="takes-section">
      <div class="takes-label">🎬 Takes</div>
      <div class="takes-list">`;

    takes.forEach((take,i)=>{
      const hookText = take.hookText || (take.hookId ? HOOKS.find(h=>h.id===take.hookId)?.text : null);
      html+=`<div class="take-row${take.done?' take-done':''}${take.logged?' take-logged':''}" id="${take.id}">
        <div class="take-top">
          <div class="take-num">${i+1}</div>
          <div class="take-hook-display${hookText?'':' no-hook'}">
            ${hookText||'No hook selected yet'}
          </div>
          <div class="take-btns">
            <button class="tbtn" onclick="openHookModal('${card.id}','${take.id}')">${hookText?'↺ Hook':'+ Hook'}</button>
            ${take.logged
              ? `<button class="tbtn logged" disabled>✓ Logged</button>`
              : take.done
                ? `<button class="tbtn log-btn" onclick="toggleLog('${card.id}','${take.id}')">Log Video</button>
                   <button class="tbtn done-btn" onclick="toggleDone('${card.id}','${take.id}')">✓ Done</button>`
                : `<button class="tbtn" onclick="toggleDone('${card.id}','${take.id}')">Mark Done</button>`
            }
            ${!take.logged?`<button class="tbtn del" onclick="removeTake('${card.id}','${take.id}')">✕</button>`:''}
          </div>
        </div>`;

      if(take.showLog && !take.logged){
        html+=`<div class="take-log-form">
          <input type="text" class="take-log-input" id="lv-id-${take.id}" placeholder="Video ID (optional)">
          <input type="text" class="take-log-input" id="lv-time-${take.id}" placeholder="Time posted">
          <select class="take-log-select" id="lv-type-${take.id}">
            <option value="">Video Type...</option>
            <option>Talking-Head Review</option><option>Problem/Solution</option>
            <option>Storytime</option><option>Things I Wish I Bought Sooner</option>
            <option>First Impression</option><option>POV Style</option>
            <option>Relatable Mom/Lifestyle Skit</option><option>Tutorial/How-To-Use</option>
            <option>Before & After</option><option>Unboxing</option><option>Aesthetic B-Roll</option>
          </select>
          <select class="take-log-select" id="lv-sales-${take.id}">
            <option value="">Got Sales?</option>
            <option value="✅ Yes">✅ Yes</option>
            <option value="❌ No">❌ No</option>
          </select>
          <button class="take-log-submit" id="log-btn-${take.id}" onclick="logVideo('${card.id}','${take.id}')">Save to Video Tracker</button>
          <div class="take-log-msg" id="lv-msg-${take.id}"></div>
        </div>`;
      }
      html+=`</div>`;
    });

    html+=`</div>
      <button class="add-take-btn" onclick="addTake('${card.id}')">+ Add Take</button>
    </div></div>`;
  });

  html+='</div>';
  main.innerHTML=html;
}

// ── NOTION HELPERS ────────────────────────────────────────
async function createNotionTake(card, takeNum, hookText='') {
  const res = await fetch(`${API}?endpoint=pages`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      parent: {database_id: TODO_DB},
      properties: {
        'Product Name': {title:[{text:{content:card.productName}}]},
        'Date': {date:{start:todayKey}},
        'Brand': {rich_text:[{text:{content:card.brand||''}}]},
        'Script': {rich_text:[{text:{content:card.script||''}}]},
        'Take Number': {number: takeNum},
        'Hook': {rich_text:[{text:{content:hookText}}]},
        'Done': {checkbox: false},
        'Logged to Tracker': {checkbox: false},
        'Product ID': {rich_text:[{text:{content:card.productId||''}}]},
        ...(card.link?{'Shop Link':{url:card.link}}:{})
      }
    })
  });
  const data = await res.json();
  return data.id;
}

async function updateNotionTake(notionId, props) {
  await fetch(`${API}?endpoint=pages/${notionId}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({properties: props})
  });
}

async function deleteNotionPage(notionId) {
  await fetch(`${API}?endpoint=pages/${notionId}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({archived: true})
  });
}

// ── ACTIONS ───────────────────────────────────────────────
async function removeCard(id) {
  if(!confirm('Remove this product and all its takes?'))return;
  const card = TODO.find(c=>c.id===id);
  if(!card)return;
  for(const take of card.takes) {
    if(take.notionId) await deleteNotionPage(take.notionId);
  }
  TODO = TODO.filter(c=>c.id!==id);
  render();
}

async function addTake(cardId) {
  const card = TODO.find(c=>c.id===cardId);
  if(!card)return;
  const takeNum = (card.takes.length||0)+1;
  const btn = document.querySelector(`#card-${cardId} .add-take-btn`);
  if(btn){btn.disabled=true;btn.textContent='Adding...';}
  const notionId = await createNotionTake(card, takeNum);
  card.takes.push({id:'take-'+notionId, notionId, hookText:'', hookId:null, done:false, logged:false, showLog:false, takeNum});
  render();
}

async function removeTake(cardId, takeId) {
  const card = TODO.find(c=>c.id===cardId);
  const take = card?.takes.find(t=>t.id===takeId);
  if(!take)return;
  if(take.notionId) await deleteNotionPage(take.notionId);
  card.takes = card.takes.filter(t=>t.id!==takeId);
  render();
}

async function toggleDone(cardId, takeId) {
  const card = TODO.find(c=>c.id===cardId);
  const take = card?.takes.find(t=>t.id===takeId);
  if(!take)return;
  take.done = !take.done;
  render();
  if(take.notionId) await updateNotionTake(take.notionId, {'Done':{checkbox:take.done}});

  if(take.done) {
    try {
      const calPosts = JSON.parse(localStorage.getItem('kortny-posts')||'[]');
      const label = take.hookText ? card.productName+' — '+take.hookText.substring(0,30)+'…' : card.productName;
      calPosts.push({id:'todo-'+take.id, title:label, date:todayKey, type:'post'});
      localStorage.setItem('kortny-posts', JSON.stringify(calPosts));
    } catch(e){}
  } else {
    try {
      const calPosts = JSON.parse(localStorage.getItem('kortny-posts')||'[]');
      localStorage.setItem('kortny-posts', JSON.stringify(calPosts.filter(p=>p.id!=='todo-'+takeId)));
    } catch(e){}
  }
}

function toggleLog(cardId, takeId) {
  const card = TODO.find(c=>c.id===cardId);
  const take = card?.takes.find(t=>t.id===takeId);
  if(!take)return;
  take.showLog = !take.showLog;
  render();
}

async function restartDay() {
  if(!confirm('Archive all today\'s takes and start fresh?'))return;
  for(const card of TODO) {
    for(const take of card.takes) {
      if(take.notionId) await deleteNotionPage(take.notionId);
    }
  }
  TODO = [];
  render();
}

function copyScript(cardId) {
  const card = TODO.find(c=>c.id===cardId);
  if(card?.script) navigator.clipboard.writeText(card.script);
}

function startEditScript(cardId) {
  const card = TODO.find(c=>c.id===cardId);
  if(!card)return;
  card.editing = true;
  render();
  // Focus and move cursor to end
  const ta = document.getElementById('script-edit-'+cardId);
  if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
}

function cancelEditScript(cardId) {
  const card = TODO.find(c=>c.id===cardId);
  if(!card)return;
  card.editing = false;
  render();
}

async function saveEditScript(cardId) {
  const card = TODO.find(c=>c.id===cardId);
  if(!card)return;
  const ta = document.getElementById('script-edit-'+cardId);
  if(!ta)return;
  const newText = ta.value.trim();
  if(!newText)return;
  card.script = newText;
  card.editing = false;
  render();
  // Sync updated script to all takes in Notion
  for(const take of card.takes) {
    if(take.notionId) await updateNotionTake(take.notionId, {'Script':{rich_text:[{text:{content:newText.substring(0,2000)}}]}});
  }
}

// ── PRODUCT PICKER ────────────────────────────────────────
function openPicker() {
  pickerSelected = new Set(TODO.map(c=>c.productId).filter(Boolean));
  document.getElementById('picker-search').value='';
  filterPicker();
  document.getElementById('picker-modal').classList.add('open');
}
function closePicker(){document.getElementById('picker-modal').classList.remove('open');}
function filterPicker() {
  const q = document.getElementById('picker-search').value.toLowerCase();
  const filtered = ALL_PRODUCTS.filter(p=>!q||p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q));
  document.getElementById('picker-list').innerHTML = filtered.map(p=>`
    <div class="picker-item${pickerSelected.has(p.id)?' selected':''}" onclick="togglePick('${p.id}')">
      <div class="picker-check">${pickerSelected.has(p.id)?'✓':''}</div>
      <div>
        <div class="picker-name">${p.name}</div>
        ${p.brand?`<div class="picker-meta">${p.brand}${p.stock?' · '+p.stock:''}</div>`:''}
      </div>
    </div>`).join('') || '<div style="text-align:center;padding:20px;color:var(--ink-muted);font-style:italic">No products found</div>';
}
function togglePick(id) {
  if(pickerSelected.has(id)) pickerSelected.delete(id);
  else pickerSelected.add(id);
  filterPicker();
}
async function addSelectedProducts() {
  const existing = new Set(TODO.map(c=>c.productId).filter(Boolean));
  const toAdd = [...pickerSelected].filter(id=>!existing.has(id));
  if(!toAdd.length){closePicker();return;}

  const btn = document.getElementById('picker-add-btn');
  btn.disabled=true; btn.textContent='Adding...';

  for(const id of toAdd) {
    const p = ALL_PRODUCTS.find(x=>x.id===id);
    if(!p)continue;
    const card = {id:'card-'+uid(), productId:p.id, productName:p.name, brand:p.brand, link:p.link, productFeatures:p.features||'', script:null, takes:[]};
    TODO.push(card);
  }
  closePicker();
  render();
  btn.disabled=false; btn.textContent='Add to Today';
}

// ── HOOK PICKER ───────────────────────────────────────────
function openHookModal(cardId, takeId) {
  hookTargetId = {cardId, takeId};
  document.getElementById('hook-search').value='';
  const card = TODO.find(c=>c.id===cardId);
  document.getElementById('hook-modal-sub').textContent = card?'For: '+card.productName:'Choose a hook';
  filterHooks();
  document.getElementById('hook-modal').classList.add('open');
}
function closeHookModal(){document.getElementById('hook-modal').classList.remove('open');}
function filterHooks() {
  const q = document.getElementById('hook-search').value.toLowerCase();
  const filtered = HOOKS.filter(h=>!q||h.text.toLowerCase().includes(q)||h.catName.toLowerCase().includes(q));
  document.getElementById('hook-list').innerHTML = filtered.map(h=>`
    <div class="hook-item" onclick="selectHook('${h.id}')">
      <div class="hook-item-cat">${h.catEmoji} ${h.catName}</div>
      ${h.text}
    </div>`).join('') || '<div style="text-align:center;padding:20px;color:var(--ink-muted);font-style:italic">No hooks found</div>';
}
async function selectHook(hookId) {
  if(!hookTargetId)return;
  const card = TODO.find(c=>c.id===hookTargetId.cardId);
  const take = card?.takes.find(t=>t.id===hookTargetId.takeId);
  const hook = HOOKS.find(h=>h.id===hookId);
  if(take && hook) {
    take.hookId = hookId;
    take.hookText = hook.text;
    closeHookModal(); render();
    if(take.notionId) await updateNotionTake(take.notionId, {'Hook':{rich_text:[{text:{content:hook.text}}]}});
  }
}

// ── SCRIPT GENERATION ─────────────────────────────────────
function openScriptModal(cardId) {
  scriptTargetCardId = cardId;
  scriptAngle = 'story';
  document.getElementById('script-details').value='';
  document.getElementById('custom-angle').value='';
  document.getElementById('custom-angle').classList.remove('has-value');
  document.getElementById('script-msg').textContent='';
  document.getElementById('gen-btn').disabled=false;
  document.getElementById('gen-btn').textContent='✦ Generate';
  document.getElementById('angle-row').querySelectorAll('.abtn').forEach((b,i)=>b.classList.toggle('active',i===0));
  const card = TODO.find(c=>c.id===cardId);
  document.getElementById('script-modal-title').textContent = card?'Script for '+card.productName:'Generate Script';
  document.getElementById('script-modal').classList.add('open');
}
function closeScriptModal(){document.getElementById('script-modal').classList.remove('open');}

function setAngle(angle, btn) {
  scriptAngle = angle;
  document.getElementById('angle-row').querySelectorAll('.abtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // Clear the custom input when a button is selected
  const customInput = document.getElementById('custom-angle');
  customInput.value = '';
  customInput.classList.remove('has-value');
}

function onCustomAngle(input) {
  if(input.value.trim()) {
    scriptAngle = input.value.trim();
    input.classList.add('has-value');
    // Deactivate all angle buttons
    document.getElementById('angle-row').querySelectorAll('.abtn').forEach(b=>b.classList.remove('active'));
  } else {
    // Revert to story if cleared
    scriptAngle = 'story';
    input.classList.remove('has-value');
    document.getElementById('angle-row').querySelector('.abtn').classList.add('active');
  }
}

async function generateScript() {
  const card = TODO.find(c=>c.id===scriptTargetCardId);
  if(!card)return;
  const details = document.getElementById('script-details').value.trim();
  const btn = document.getElementById('gen-btn');
  btn.disabled=true; btn.textContent='Generating...';
  document.getElementById('script-msg').textContent='Writing your script...';
  try {
    const res = await fetch('https://kortny-api.vercel.app/api/notion?service=anthropic',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-5',max_tokens:400,
        system:`You are a TikTok Shop affiliate script writer for @helloitskortny. Write authentic 30-second scripts that feel like a real person talking to a friend. Hook-First. CTA ends with "Grabbed it through TikTok Shop". No prices. No guaranteed results. Short sentences. First-person. Output ONLY the spoken words — no labels, no formatting.`,
        messages:[{role:'user',content:`Write a 30-second TikTok script for: ${card.productName}${card.brand?' by '+card.brand:''}.
Script angle: ${scriptAngle}.
${card.productFeatures?`Product features (use these facts — do not guess):\n${card.productFeatures}`:''}
${details?'Additional notes: '+details:''}
Output only the words to say on camera.`}]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text||'';
    if(text) {
      card.script = text;
      closeScriptModal(); render();
      for(const take of card.takes) {
        if(take.notionId) await updateNotionTake(take.notionId, {'Script':{rich_text:[{text:{content:text.substring(0,2000)}}]}});
      }
    } else {
      document.getElementById('script-msg').textContent='Error. Try again.';
      btn.disabled=false; btn.textContent='✦ Generate';
    }
  } catch(e) {
    document.getElementById('script-msg').textContent='Network error.';
    btn.disabled=false; btn.textContent='✦ Generate';
  }
}

// ── LOG TO VIDEO TRACKER ──────────────────────────────────
async function logVideo(cardId, takeId) {
  const card = TODO.find(c=>c.id===cardId);
  const take = card?.takes.find(t=>t.id===takeId);
  if(!take)return;
  const videoId = document.getElementById(`lv-id-${takeId}`).value.trim();
  const timePosted = document.getElementById(`lv-time-${takeId}`).value.trim();
  const videoType = document.getElementById(`lv-type-${takeId}`).value;
  const gotSales = document.getElementById(`lv-sales-${takeId}`).value;
  const msgEl = document.getElementById(`lv-msg-${takeId}`);
  const btn = document.getElementById(`log-btn-${takeId}`);
  if(btn){btn.disabled=true;btn.textContent='Saving...';}

  try {
    const res = await fetch(`${API}?endpoint=pages`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({parent:{database_id:VIDEO_DB},properties:{
        'Video ID':{title:[{text:{content:videoId||'—'}}]},
        'Product':{rich_text:[{text:{content:card.productName}}]},
        'Date Posted':{date:{start:todayKey}},
        ...(timePosted?{'Time Posted':{rich_text:[{text:{content:timePosted}}]}}:{}),
        ...(videoType?{'Video Type':{select:{name:videoType}}}:{}),
        ...(gotSales?{'Got Sales?':{select:{name:gotSales}}}:{}),
        ...(take.hookText?{'Video Title / Hook (copy)':{rich_text:[{text:{content:take.hookText.substring(0,100)}}]}}:{}),
      }})
    });
    if(res.ok) {
      take.logged=true; take.showLog=false;
      if(take.notionId) await updateNotionTake(take.notionId, {'Logged to Tracker':{checkbox:true}});
      render();
    } else {
      if(msgEl){msgEl.textContent='Error saving.';msgEl.className='take-log-msg error';}
      if(btn){btn.disabled=false;btn.textContent='Save to Video Tracker';}
    }
  } catch(e) {
    if(msgEl){msgEl.textContent='Network error.';msgEl.className='take-log-msg error';}
    if(btn){btn.disabled=false;btn.textContent='Save to Video Tracker';}
  }
}

document.getElementById('picker-modal').addEventListener('click',function(e){if(e.target===this)closePicker();});
document.getElementById('hook-modal').addEventListener('click',function(e){if(e.target===this)closeHookModal();});
document.getElementById('script-modal').addEventListener('click',function(e){if(e.target===this)closeScriptModal();});

// Delegated listeners for dynamically rendered script buttons
document.body.addEventListener('click', function(e) {
  const startBtn = e.target.closest('.js-start-edit');
  if(startBtn){
    const id = startBtn.getAttribute('data-card-id');
    console.log('Edit clicked, card id:', id, 'TODO ids:', TODO.map(c=>c.id));
    startEditScript(id);
    return;
  }
  const cancelBtn = e.target.closest('.js-cancel-edit');
  if(cancelBtn){ cancelEditScript(cancelBtn.getAttribute('data-card-id')); return; }
  const saveBtn = e.target.closest('.js-save-edit');
  if(saveBtn){ saveEditScript(saveBtn.getAttribute('data-card-id')); return; }
  const copyBtn = e.target.closest('.js-copy-script');
  if(copyBtn){ copyScript(copyBtn.getAttribute('data-card-id')); return; }
});

init();
</script>
