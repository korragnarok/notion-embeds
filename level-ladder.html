<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#120d09">
<title>Level Ladder</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
:root{--espresso:#120d09;--brown-deep:#1c1410;--brown-mid:#2a1e16;--brown-lift:#3d2a1e;--brown-surface:#4a3428;--sage:#7a9e7e;--sage-light:#a8c5a4;--sage-dim:#4a6b4e;--tan:#c9a87a;--tan-dim:#7a5e3a;--text-bright:#f0e8de;--text-mid:#a89880;--text-muted:#6a5848;--border:rgba(200,168,120,0.1);--border-lift:rgba(200,168,120,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--espresso);color:var(--text-bright);font-family:'DM Sans',sans-serif;min-height:100vh;}
nav{background:rgba(18,13,9,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text-bright);text-decoration:none;}
.nav-logo span{color:var(--sage-light);font-style:italic;}
.nav-right{display:flex;gap:8px;}
.nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;text-decoration:none;display:inline-flex;align-items:center;}
.nav-btn:hover{border-color:var(--border-lift);color:var(--text-bright);}
.page-header{padding:24px 28px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.page-eyebrow{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--tan);margin-bottom:6px;font-weight:500;display:flex;align-items:center;gap:10px;}
.page-eyebrow::before{content:'';display:inline-block;width:20px;height:1px;background:var(--tan-dim);}
.page-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1;color:var(--text-bright);}
.page-title em{font-style:italic;color:var(--sage-light);}
.header-right{text-align:right;}
.header-month{font-size:12px;color:var(--text-muted);margin-bottom:4px;}
.header-gmv{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--sage-light);line-height:1;}
.header-gmv-label{font-size:10px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}
.main{max-width:680px;margin:0 auto;padding:24px 24px 60px;}
.progress-section{background:var(--brown-mid);border-radius:14px;border:1px solid var(--border);padding:22px 24px;margin-bottom:16px;}
.progress-label{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-muted);font-weight:600;margin-bottom:14px;}
.progress-tier-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;letter-spacing:-0.01em;margin-bottom:12px;}
.progress-bar-bg{background:var(--brown-lift);border-radius:100px;height:8px;overflow:hidden;margin-bottom:8px;}
.progress-bar-fill{height:8px;border-radius:100px;transition:width 0.8s cubic-bezier(.4,0,.2,1);}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);}
.to-next{background:var(--brown-lift);border-radius:10px;border:1px solid var(--border);padding:12px 16px;font-size:13px;color:var(--text-mid);margin-top:14px;line-height:1.6;}
.to-next strong{color:var(--text-bright);font-weight:600;}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-muted);font-weight:600;margin-bottom:10px;padding-left:2px;}
.levels-list{display:flex;flex-direction:column;gap:8px;}
.level-row{background:var(--brown-mid);border-radius:12px;border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:border-color 0.2s;}
.level-row.achieved{opacity:0.6;}
.level-row.locked{opacity:0.35;}
.level-emoji{font-size:24px;width:32px;text-align:center;flex-shrink:0;}
.level-info{flex:1;min-width:0;}
.level-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1;}
.level-range{font-size:12px;color:var(--text-muted);margin-top:3px;}
.level-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.level-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:100px;letter-spacing:0.06em;text-transform:uppercase;}
.badge-achieved{background:rgba(122,158,126,0.15);color:var(--sage-light);}
.badge-current{background:rgba(122,158,126,0.25);color:var(--sage-light);}
.badge-locked{background:rgba(106,88,72,0.3);color:var(--text-muted);}
.mini-bar-bg{width:80px;height:4px;background:var(--brown-lift);border-radius:100px;overflow:hidden;}
.mini-bar-fill{height:4px;border-radius:100px;}
.loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")
          .then(reg => console.log("[SW] Registered", reg.scope))
          .catch(err => console.warn("[SW] Failed", err));
      });
    }
  </script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">hello<span>itskortny</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-btn">← Home</a>
    <button class="nav-btn" onclick="loadFromNotion()">↻ Refresh</button>
  </div>
</nav>
<div class="page-header">
  <div>
    <div class="page-eyebrow">@helloitskortny</div>
    <div class="page-title">GMV <em>Level Ladder</em></div>
  </div>
  <div class="header-right">
    <div class="header-month" id="header-month">—</div>
    <div class="header-gmv" id="header-gmv">—</div>
    <div class="header-gmv-label">this month</div>
  </div>
</div>
<div class="main" id="main-content">
  <div style="text-align:center;padding:48px"><div class="loading-spinner"></div><div style="color:var(--text-muted)">Loading from Notion...</div></div>
</div>
<script>
const API='https://kortny-api.vercel.app/api/notion';
const DB_ID='a35bab03eb3544729b8019ddfc019e4e';
const MONTHS_FULL=['January','February','March','April','May','June','July','August','September','October','November','December'];
const LEVELS=[{name:'Bronze',emoji:'🥉',min:0,max:999,color:'#c9a87a'},{name:'Silver',emoji:'🥈',min:1000,max:4999,color:'#9a9890'},{name:'Gold',emoji:'🥇',min:5000,max:24999,color:'#ba7517'},{name:'Platinum',emoji:'💎',min:25000,max:59999,color:'#7a9e7e'},{name:'Ruby',emoji:'🩸',min:60000,max:149999,color:'#a32d2d'},{name:'Emerald',emoji:'🌿',min:150000,max:399999,color:'#3b6d11'},{name:'Sapphire',emoji:'👸',min:400000,max:999999999,color:'#185fa5'}];
function fmt(n){return'$'+Math.round(n).toLocaleString('en-US');}
function fmtD(n){return'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
async function loadFromNotion(){
  document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:48px"><div class="loading-spinner"></div><div style="color:var(--text-muted)">Loading...</div></div>';
  try{
    const today=new Date(),thisYear=today.getFullYear(),thisMonth=today.getMonth();
    const monthStart=thisYear+'-'+String(thisMonth+1).padStart(2,'0')+'-01';
    const nextMonth=new Date(thisYear,thisMonth+1,1);
    const monthEnd=nextMonth.getFullYear()+'-'+String(nextMonth.getMonth()+1).padStart(2,'0')+'-01';
    const res=await fetch(`${API}?endpoint=databases/${DB_ID}/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page_size:100,filter:{and:[{property:'Date',date:{on_or_after:monthStart}},{property:'Date',date:{before:monthEnd}}]}})});
    const data=await res.json();
    const monthGMV=(data.results||[]).reduce((s,p)=>s+(p.properties.GMV?.number||0),0);
    document.getElementById('header-month').textContent=MONTHS_FULL[thisMonth]+' '+thisYear;
    document.getElementById('header-gmv').textContent=fmtD(monthGMV);
    renderLadder(monthGMV);
  }catch(e){document.getElementById('main-content').innerHTML='<div style="text-align:center;padding:48px;color:var(--text-muted)">Error loading. Try refreshing.</div>';}
}
function renderLadder(monthGMV){
  function getCurrentLevelIdx(){for(let i=LEVELS.length-1;i>=0;i--){if(monthGMV>=LEVELS[i].min)return i;}return 0;}
  const currentIdx=getCurrentLevelIdx(),currentLevel=LEVELS[currentIdx],nextLevel=LEVELS[currentIdx+1];
  const pct=nextLevel?Math.min(100,Math.round((monthGMV-currentLevel.min)/(currentLevel.max-currentLevel.min)*100)):100;
  let html=`<div class="progress-section"><div class="progress-label">Current level progress</div><div class="progress-tier-name" style="color:${currentLevel.color}">${currentLevel.emoji} ${currentLevel.name}</div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${currentLevel.color}"></div></div><div class="progress-meta"><span>${pct}% through this tier</span><span>${fmt(currentLevel.min)} – ${nextLevel?fmt(currentLevel.max):'+'}</span></div><div class="to-next">`;
  if(nextLevel){const needed=nextLevel.min-monthGMV;html+=`You need <strong>${fmtD(needed)} more</strong> in GMV to reach ${nextLevel.emoji} ${nextLevel.name} — keep going!`;}
  else html+=`<strong>You've reached the top! Sapphire status achieved. 👸</strong>`;
  html+=`</div></div><div class="section-label">All levels</div><div class="levels-list">`;
  LEVELS.forEach((lvl,i)=>{
    const achieved=i<currentIdx,isCurrent=i===currentIdx,locked=i>currentIdx;
    const miniPct=isCurrent?pct:achieved?100:0;
    const rangeStr=lvl.max>999999?fmt(lvl.min)+' +':fmt(lvl.min)+' – '+fmt(lvl.max);
    let badgeClass,badgeText;
    if(achieved){badgeClass='badge-achieved';badgeText='Achieved';}else if(isCurrent){badgeClass='badge-current';badgeText='Current';}else{badgeClass='badge-locked';badgeText='Locked';}
    html+=`<div class="level-row${achieved?' achieved':''}${locked?' locked':''}" ${isCurrent?`style="border-color:${lvl.color};border-width:2px;"`:''}><div class="level-emoji">${lvl.emoji}</div><div class="level-info"><div class="level-name" style="color:${isCurrent?lvl.color:'inherit'}">${lvl.name}</div><div class="level-range">${rangeStr}</div></div><div class="level-right"><span class="level-badge ${badgeClass}">${badgeText}</span><div class="mini-bar-bg"><div class="mini-bar-fill" style="width:${miniPct}%;background:${lvl.color}"></div></div></div></div>`;
  });
  html+='</div>';
  document.getElementById('main-content').innerHTML=html;
}
loadFromNotion();
</script>
</body>
</html>
