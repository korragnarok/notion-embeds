<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMV Level Ladder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:#6b7a5a;--sage-mid:#8a9a6e;--sage-light:#c5d4a8;
    --tan:#c9a87a;--tan-dark:#9b6e3a;
    --cream:#f4ede0;--cream-dark:#e8dcc8;
    --ink:#2e2a24;--ink-mid:#5a5248;--ink-muted:#8a8078;
    --border:rgba(107,122,90,0.15);--white:#faf7f2;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;}

  header{background:var(--ink);padding:32px 40px 24px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--tan);margin-bottom:6px;font-weight:500;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:0.9;color:var(--white);letter-spacing:0.02em;}
  header h1 span{color:var(--sage-light);}
  .header-right{text-align:right;}
  .header-month{font-size:12px;color:#7a7068;font-style:italic;font-family:'DM Serif Display',serif;margin-bottom:4px;}
  .header-gmv{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--sage-light);line-height:1;}
  .header-gmv-label{font-size:11px;color:#7a7068;letter-spacing:0.08em;text-transform:uppercase;}
  .refresh-btn{background:none;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:6px 14px;font-size:12px;color:#7a7068;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;margin-top:8px;display:block;}
  .refresh-btn:hover{border-color:var(--sage-light);color:var(--sage-light);}

  .main{max-width:680px;margin:0 auto;padding:32px 24px 80px;}

  .progress-section{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:22px 24px;margin-bottom:20px;}
  .progress-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);font-weight:500;margin-bottom:14px;}
  .progress-tier-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:0.03em;margin-bottom:10px;}
  .progress-bar-bg{background:var(--cream-dark);border-radius:100px;height:10px;overflow:hidden;margin-bottom:8px;}
  .progress-bar-fill{height:10px;border-radius:100px;transition:width 0.8s cubic-bezier(.4,0,.2,1);}
  .progress-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-muted);}
  .to-next{background:var(--cream);border-radius:8px;border:1px solid var(--border);padding:12px 16px;font-size:13px;color:var(--ink-mid);margin-top:14px;font-style:italic;font-family:'DM Serif Display',serif;}
  .to-next strong{font-style:normal;font-family:'DM Sans',sans-serif;font-weight:500;color:var(--ink);}

  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);font-weight:500;margin-bottom:12px;padding-left:2px;}
  .levels-list{display:flex;flex-direction:column;gap:8px;}
  .level-row{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:14px;transition:border-color 0.2s;}
  .level-row.achieved{background:var(--cream);}
  .level-row.current{border-width:2px;}
  .level-row.locked{opacity:0.5;}
  .level-emoji{font-size:26px;width:36px;text-align:center;flex-shrink:0;}
  .level-info{flex:1;min-width:0;}
  .level-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.03em;line-height:1;}
  .level-range{font-size:12px;color:var(--ink-muted);margin-top:3px;font-style:italic;font-family:'DM Serif Display',serif;}
  .level-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
  .level-badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:100px;letter-spacing:0.06em;text-transform:uppercase;}
  .badge-achieved{background:rgba(107,122,90,0.15);color:#4a5c36;}
  .badge-current{background:rgba(107,122,90,0.25);color:#3a4c28;}
  .badge-locked{background:var(--cream-dark);color:var(--ink-muted);}
  .mini-bar-bg{width:90px;height:5px;background:var(--cream-dark);border-radius:100px;overflow:hidden;}
  .mini-bar-fill{height:5px;border-radius:100px;}

  .loading{text-align:center;padding:48px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;}
  .loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<header>
  <div>
    <div class="eyebrow">@helloitskortny</div>
    <h1>GMV<br><span>Level</span><br>Ladder</h1>
  </div>
  <div class="header-right">
    <div class="header-month" id="header-month">—</div>
    <div class="header-gmv" id="header-gmv">—</div>
    <div class="header-gmv-label">this month</div>
    <button class="refresh-btn" onclick="loadFromNotion()">↻ Refresh</button>
  </div>
</header>

<div class="main" id="main-content">
  <div class="loading"><div class="loading-spinner"></div>Loading from Notion...</div>
</div>

<script>
const API = 'https://kortny-api.vercel.app/api/notion';
const DB_ID = 'a35bab03eb3544729b8019ddfc019e4e';
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const LEVELS = [
  {name:'Bronze',   emoji:'🥉', min:0,      max:999,       color:'#c9a87a'},
  {name:'Silver',   emoji:'🥈', min:1000,   max:4999,      color:'#9a9890'},
  {name:'Gold',     emoji:'🥇', min:5000,   max:24999,     color:'#ba7517'},
  {name:'Platinum', emoji:'💎', min:25000,  max:59999,     color:'#6b7a5a'},
  {name:'Ruby',     emoji:'🩸', min:60000,  max:149999,    color:'#a32d2d'},
  {name:'Emerald',  emoji:'🐍', min:150000, max:399999,    color:'#3b6d11'},
  {name:'Sapphire', emoji:'👸', min:400000, max:999999999, color:'#185fa5'},
];

function fmt(n){return '$'+Math.round(n).toLocaleString('en-US');}
function fmtD(n){return '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}

async function loadFromNotion() {
  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading from Notion...</div>';
  document.getElementById('header-gmv').textContent = '—';

  try {
    const today = new Date();
    const thisYear = today.getFullYear();
    const thisMonth = today.getMonth();
    const monthStart = thisYear+'-'+String(thisMonth+1).padStart(2,'0')+'-01';
    const nextMonth = new Date(thisYear, thisMonth+1, 1);
    const monthEnd = nextMonth.getFullYear()+'-'+String(nextMonth.getMonth()+1).padStart(2,'0')+'-01';

    const res = await fetch(`${API}?endpoint=databases/${DB_ID}/query`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        page_size: 100,
        filter: {
          and: [
            {property:'Date', date:{on_or_after:monthStart}},
            {property:'Date', date:{before:monthEnd}},
          ]
        }
      })
    });
    const data = await res.json();
    const monthGMV = (data.results||[]).reduce((s,p) => s + (p.properties.GMV?.number||0), 0);

    document.getElementById('header-month').textContent = MONTHS_FULL[thisMonth]+' '+thisYear;
    document.getElementById('header-gmv').textContent = fmtD(monthGMV);

    renderLadder(monthGMV);
  } catch(e) {
    console.error(e);
    document.getElementById('main-content').innerHTML = '<div class="loading">Error loading data. Try refreshing.</div>';
  }
}

function renderLadder(monthGMV) {
  function getCurrentLevelIdx() {
    for (let i=LEVELS.length-1; i>=0; i--) {
      if (monthGMV >= LEVELS[i].min) return i;
    }
    return 0;
  }

  const currentIdx = getCurrentLevelIdx();
  const currentLevel = LEVELS[currentIdx];
  const nextLevel = LEVELS[currentIdx+1];
  const pct = nextLevel
    ? Math.min(100, Math.round((monthGMV-currentLevel.min)/(currentLevel.max-currentLevel.min)*100))
    : 100;

  let html = `
    <div class="progress-section">
      <div class="progress-label">Current level progress</div>
      <div class="progress-tier-name" style="color:${currentLevel.color}">${currentLevel.emoji} ${currentLevel.name}</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%;background:${currentLevel.color}"></div>
      </div>
      <div class="progress-meta">
        <span>${pct}% through this tier</span>
        <span>${fmt(currentLevel.min)} – ${nextLevel?fmt(currentLevel.max):'+'}</span>
      </div>
      <div class="to-next">`;

  if (nextLevel) {
    const needed = nextLevel.min - monthGMV;
    html += `You need <strong>${fmtD(needed)} more</strong> in GMV to reach ${nextLevel.emoji} ${nextLevel.name} — keep going!`;
  } else {
    html += `<strong>You've reached the top! Sapphire status achieved. 👸</strong>`;
  }

  html += `</div></div>
    <div class="section-label">All levels</div>
    <div class="levels-list">`;

  LEVELS.forEach((lvl, i) => {
    const achieved = i < currentIdx;
    const isCurrent = i === currentIdx;
    const locked = i > currentIdx;
    const miniPct = isCurrent ? pct : achieved ? 100 : 0;
    const rangeStr = lvl.max > 999999 ? fmt(lvl.min)+' +' : fmt(lvl.min)+' – '+fmt(lvl.max);

    let badgeClass, badgeText;
    if (achieved) { badgeClass='badge-achieved'; badgeText='Achieved'; }
    else if (isCurrent) { badgeClass='badge-current'; badgeText='Current'; }
    else { badgeClass='badge-locked'; badgeText='Locked'; }

    html += `
      <div class="level-row${achieved?' achieved':''}${isCurrent?' current':''}${locked?' locked':''}" ${isCurrent?`style="border-color:${lvl.color}"`:''}">
        <div class="level-emoji">${lvl.emoji}</div>
        <div class="level-info">
          <div class="level-name" style="color:${isCurrent?lvl.color:'inherit'}">${lvl.name}</div>
          <div class="level-range">${rangeStr}</div>
        </div>
        <div class="level-right">
          <span class="level-badge ${badgeClass}">${badgeText}</span>
          <div class="mini-bar-bg">
            <div class="mini-bar-fill" style="width:${miniPct}%;background:${lvl.color}"></div>
          </div>
        </div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('main-content').innerHTML = html;
}

loadFromNotion();
</script>
</body>
</html>
