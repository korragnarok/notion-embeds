<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:#6b7a5a;--sage-mid:#8a9a6e;--sage-light:#c5d4a8;
    --tan:#c9a87a;--tan-dark:#9b6e3a;
    --cream:#f4ede0;--cream-dark:#e8dcc8;
    --ink:#2e2a24;--ink-mid:#5a5248;--ink-muted:#8a8078;
    --border:rgba(107,122,90,0.15);--white:#faf7f2;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;}

  header{background:var(--ink);padding:28px 36px 22px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--tan);margin-bottom:4px;font-weight:500;}
  header h1{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:0.9;color:var(--white);}
  header h1 span{color:var(--sage-light);}
  .header-btns{display:flex;gap:8px;align-items:center;}
  .add-btn{background:var(--sage);color:white;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;}
  .add-btn:hover{background:var(--sage-mid);}
  .refresh-btn{background:none;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 16px;font-size:13px;color:#7a7068;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;}
  .refresh-btn:hover{border-color:var(--sage-light);color:var(--sage-light);}

  .main{max-width:1100px;margin:0 auto;padding:24px 24px 80px;}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:var(--white);border-radius:10px;border:1px solid var(--border);padding:14px 16px;}
  .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-muted);font-weight:500;margin-bottom:5px;}
  .stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--ink);}
  .stat-val.green{color:var(--sage);}
  .stat-sub{font-size:11px;color:var(--ink-muted);margin-top:3px;font-style:italic;font-family:'DM Serif Display',serif;}

  .filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
  .filter-btn{background:var(--white);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;color:var(--ink-muted);transition:all 0.12s;}
  .filter-btn.active{background:var(--ink);color:var(--white);border-color:var(--ink);}
  .search-input{flex:1;min-width:180px;padding:7px 12px;border:1px solid var(--border);border-radius:100px;background:var(--white);color:var(--ink);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
  .search-input:focus{border-color:var(--sage-mid);}

  .table-wrap{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-muted);padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--cream);font-weight:500;cursor:pointer;white-space:nowrap;}
  thead th:hover{color:var(--ink);}
  thead th.num{text-align:right;}
  tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:var(--cream);}
  tbody td{padding:11px 14px;font-size:13px;color:var(--ink);vertical-align:middle;}
  tbody td.num{text-align:right;}
  .video-id{font-family:'DM Serif Display',serif;font-style:italic;color:var(--ink-muted);font-size:12px;}
  .product-name{font-weight:500;}
  .views-val{color:var(--sage);font-weight:500;}
  .date-val{color:var(--ink-muted);font-size:12px;}
  .sales-yes{background:rgba(107,122,90,0.15);color:#3a5228;display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:500;}
  .sales-no{background:rgba(180,60,60,0.08);color:#8a2a2a;display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:500;}
  .type-pill{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:500;background:var(--cream-dark);color:var(--ink-mid);}
  .action-btn{background:none;border:none;cursor:pointer;color:var(--ink-muted);font-size:13px;padding:2px 5px;border-radius:4px;}
  .action-btn:hover{background:var(--cream-dark);color:var(--ink);}
  .empty-state{text-align:center;padding:48px;color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif;}

  .editable-cell{cursor:pointer;border-radius:4px;padding:2px 4px;transition:background 0.12s;}
  .editable-cell:hover{background:var(--cream-dark);}
  .inline-input{padding:4px 8px;border:1px solid var(--sage-mid);border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);outline:none;width:90px;}
  .inline-select{padding:4px 8px;border:1px solid var(--sage-mid);border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);outline:none;cursor:pointer;}

  .pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--ink-muted);}
  .page-btns{display:flex;gap:4px;flex-wrap:wrap;}
  .page-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;}
  .page-btn:hover,.page-btn.active{background:var(--ink);color:var(--white);border-color:var(--ink);}

  .loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(46,42,36,0.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--white);border-radius:14px;border:1px solid var(--border);padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
  .modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;margin-bottom:20px;color:var(--ink);}
  .form-group{margin-bottom:13px;}
  .form-label{display:block;font-size:11px;font-weight:500;color:var(--ink-mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:5px;}
  .form-input,.form-select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--cream);color:var(--ink);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.12s;}
  .form-input:focus,.form-select:focus{border-color:var(--sage-mid);background:var(--white);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .btn-cancel{flex:1;background:none;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;}
  .btn-cancel:hover{background:var(--cream);}
  .btn-save{flex:2;background:var(--sage);border:none;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;color:white;font-family:'DM Sans',sans-serif;font-weight:500;}
  .btn-save:hover{background:var(--sage-mid);}
  .btn-save:disabled{opacity:0.6;cursor:not-allowed;}
  .form-msg{font-size:12px;margin-top:10px;text-align:center;font-style:italic;font-family:'DM Serif Display',serif;min-height:18px;}
  .form-msg.success{color:var(--sage);}
  .form-msg.error{color:var(--tan-dark);}

  @media(max-width:640px){
    .stats{grid-template-columns:1fr 1fr;}
    header{padding:20px;}
    .main{padding:16px 12px 60px;}
    .form-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<a href="index.html" style="position:fixed;bottom:24px;right:24px;z-index:999;background:#2e2a24;color:#faf7f2;text-decoration:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;padding:10px 18px;border-radius:100px;box-shadow:0 4px 20px rgba(0,0,0,0.2);transition:background 0.12s;" onmouseover="this.style.background='#6b7a5a'" onmouseout="this.style.background='#2e2a24'">← Home</a>

<header>
  <div>
    <div class="eyebrow">@helloitskortny</div>
    <h1>Video<br><span>Tracker</span></h1>
  </div>
  <div class="header-btns">
    <button class="refresh-btn" onclick="loadFromNotion()">↻ Refresh</button>
    <button class="add-btn" onclick="openModal()">+ Log Video</button>
  </div>
</header>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-label">Total Videos</div><div class="stat-val green" id="stat-total">—</div><div class="stat-sub">all time</div></div>
    <div class="stat"><div class="stat-label">Got Sales</div><div class="stat-val" id="stat-sales">—</div><div class="stat-sub" id="stat-sales-sub">—</div></div>
    <div class="stat"><div class="stat-label">Avg 48hr Views</div><div class="stat-val" id="stat-views">—</div><div class="stat-sub">per video</div></div>
    <div class="stat"><div class="stat-label">This Month</div><div class="stat-val" id="stat-month">—</div><div class="stat-sub">videos posted</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Sales',this)">✅ Got Sales</button>
    <button class="filter-btn" onclick="setFilter('NoSales',this)">❌ No Sales</button>
    <input type="text" class="search-input" id="search-input" placeholder="Search product or video ID..." oninput="goPage(1)">
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('videoId')">Video ID</th>
        <th onclick="sortBy('product')">Product</th>
        <th onclick="sortBy('datePosted')">Date Posted</th>
        <th>Time</th>
        <th onclick="sortBy('views48')" class="num">Views 48hr</th>
        <th onclick="sortBy('gotSales')">Got Sales</th>
        <th onclick="sortBy('videoType')">Type</th>
        <th></th>
      </tr></thead>
      <tbody id="table-body">
        <tr><td colspan="8"><div style="text-align:center;padding:40px"><div class="loading-spinner"></div><div style="color:var(--ink-muted);font-style:italic;font-family:'DM Serif Display',serif">Loading from Notion...</div></div></td></tr>
      </tbody>
    </table>
    <div class="pagination">
      <span id="page-info"></span>
      <div class="page-btns" id="page-btns"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Log Video</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Video ID</label><input type="text" class="form-input" id="inp-videoid" placeholder="e.g. 7384729103"></div>
      <div class="form-group"><label class="form-label">Date Posted</label><input type="date" class="form-input" id="inp-date"></div>
    </div>
    <div class="form-group"><label class="form-label">Product</label><input type="text" class="form-input" id="inp-product" placeholder="e.g. Shallow Bowls"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Time Posted</label><input type="text" class="form-input" id="inp-time" placeholder="e.g. 7:30 PM"></div>
      <div class="form-group"><label class="form-label">Views (48hrs)</label><input type="number" class="form-input" id="inp-views" placeholder="0" min="0"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Got Sales?</label>
        <select class="form-select" id="inp-sales">
          <option value="">— Select —</option>
          <option value="✅ Yes">✅ Yes</option>
          <option value="❌ No">❌ No</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Video Type</label>
        <select class="form-select" id="inp-type">
          <option value="">— Select —</option>
          <option>Talking-Head Review</option>
          <option>Aesthetic B-Roll</option>
          <option>Voiceover Demo</option>
          <option>Problem/Solution</option>
          <option>Storytime</option>
          <option>Things I Wish I Bought Sooner</option>
          <option>Comparison</option>
          <option>Product Routine</option>
          <option>Unboxing</option>
          <option>First Impression</option>
          <option>3 Reasons Why / 5 Things I Love</option>
          <option>Before & After</option>
          <option>Relatable Mom/Lifestyle Skit</option>
          <option>Objection-Busting</option>
          <option>Tutorial/How-To-Use</option>
          <option>POV Style</option>
          <option>Gift Idea Angle</option>
          <option>Seasonal/Use-Case Angle</option>
          <option>Honest Pros & Cons</option>
          <option>ASMR</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveVideo()">Save to Notion</button>
    </div>
    <div class="form-msg" id="form-msg"></div>
  </div>
</div>

<script>
const API = 'https://kortny-api.vercel.app/api/notion';
const DB_ID = '148a99ff772d437f91316d20a5526ffa';
const PAGE_SIZE = 25;

let DATA = [];
let filterStatus = 'All';
let sortField = 'datePosted';
let sortDir = -1;
let currentPage = 1;
let editingId = null;

function fmtDate(s){if(!s)return'—';const d=new Date(s+'T12:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});}
function fmtNum(n){if(!n&&n!==0)return'—';return Number(n).toLocaleString('en-US');}

async function loadFromNotion() {
  document.getElementById('table-body').innerHTML = '<tr><td colspan="8"><div style="text-align:center;padding:40px"><div class="loading-spinner"></div><div style="color:var(--ink-muted);font-style:italic;font-family:\'DM Serif Display\',serif">Loading from Notion...</div></div></td></tr>';
  try {
    let results = [], cursor = null;
    do {
      const body = {page_size:100, sorts:[{property:'Video ID',direction:'descending'}]};
      if (cursor) body.start_cursor = cursor;
      const res = await fetch(`${API}?endpoint=databases/${DB_ID}/query`,{
        method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)
      });
      const data = await res.json();
      results = [...results,...(data.results||[])];
      cursor = data.next_cursor;
    } while(cursor);

    DATA = results.map(p=>({
      id: p.id,
      videoId: p.properties['Video ID']?.title?.[0]?.plain_text||'',
      product: p.properties.Product?.rich_text?.[0]?.plain_text||'',
      datePosted: p.properties['Date Posted']?.date?.start||'',
      timePosted: p.properties['Time Posted']?.rich_text?.[0]?.plain_text||'',
      views48: p.properties['Views (48hrs)']?.number||0,
      gotSales: p.properties['Got Sales?']?.select?.name||'',
      videoType: p.properties['Video Type']?.select?.name||'',
    }));

    updateStats();
    goPage(1);
  } catch(e) {
    console.error(e);
    document.getElementById('table-body').innerHTML = '<tr><td colspan="8" class="empty-state">Error loading. Try refreshing.</td></tr>';
  }
}

function updateStats() {
  const today = new Date();
  const monthPrefix = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');
  const withSales = DATA.filter(r=>r.gotSales==='✅ Yes').length;
  const avgViews = DATA.filter(r=>r.views48>0).length
    ? Math.round(DATA.filter(r=>r.views48>0).reduce((s,r)=>s+r.views48,0)/DATA.filter(r=>r.views48>0).length)
    : 0;
  const thisMonth = DATA.filter(r=>r.datePosted.startsWith(monthPrefix)).length;
  document.getElementById('stat-total').textContent = DATA.length;
  document.getElementById('stat-sales').textContent = withSales;
  document.getElementById('stat-sales-sub').textContent = DATA.length ? Math.round(withSales/DATA.length*100)+'% conversion' : '—';
  document.getElementById('stat-views').textContent = avgViews.toLocaleString();
  document.getElementById('stat-month').textContent = thisMonth;
}

function setFilter(f,btn) {
  filterStatus=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  goPage(1);
}

function sortBy(field) {
  if(sortField===field)sortDir*=-1;
  else{sortField=field;sortDir=-1;}
  goPage(1);
}

function getFiltered() {
  const search = document.getElementById('search-input').value.toLowerCase();
  return DATA.filter(r=>{
    if(filterStatus==='Sales'&&r.gotSales!=='✅ Yes')return false;
    if(filterStatus==='NoSales'&&r.gotSales!=='❌ No')return false;
    if(search&&!r.product.toLowerCase().includes(search)&&!r.videoId.toLowerCase().includes(search))return false;
    return true;
  }).sort((a,b)=>{
    let av=a[sortField]||'',bv=b[sortField]||'';
    if(sortField==='views48'){av=Number(a.views48||0);bv=Number(b.views48||0);}
    if(av<bv)return -1*sortDir;
    if(av>bv)return 1*sortDir;
    return 0;
  });
}

function goPage(p){currentPage=p;renderTable();}

function renderTable() {
  const filtered = getFiltered();
  const total = filtered.length;
  const pages = Math.ceil(total/PAGE_SIZE)||1;
  if(currentPage>pages)currentPage=pages;
  const start = (currentPage-1)*PAGE_SIZE;
  const rows = filtered.slice(start,start+PAGE_SIZE);

  document.getElementById('page-info').textContent = total?`Showing ${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total}`:'';
  const btns = document.getElementById('page-btns');
  btns.innerHTML='';
  for(let i=1;i<=pages;i++){
    const b=document.createElement('button');
    b.className='page-btn'+(i===currentPage?' active':'');
    b.textContent=i;
    b.onclick=(()=>{const pg=i;return()=>goPage(pg);})();
    btns.appendChild(b);
  }

  const tbody = document.getElementById('table-body');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="8" class="empty-state">No videos found</td></tr>';return;}
  tbody.innerHTML = rows.map(r=>`
    <tr id="vrow-${r.id}">
      <td class="video-id">${r.videoId||'—'}</td>
      <td class="product-name">${r.product||'—'}</td>
      <td class="date-val">${fmtDate(r.datePosted)}</td>
      <td class="date-val">${r.timePosted||'—'}</td>
      <td class="num">
        <span class="editable-cell views-val" onclick="inlineEditViews('${r.id}')" title="Click to update">${fmtNum(r.views48)}</span>
      </td>
      <td>
        <span class="editable-cell" onclick="inlineEditSales('${r.id}')" title="Click to change">
          ${r.gotSales==='✅ Yes'?'<span class="sales-yes">✅ Yes</span>':r.gotSales==='❌ No'?'<span class="sales-no">❌ No</span>':'—'}
        </span>
      </td>
      <td>${r.videoType?`<span class="type-pill">${r.videoType}</span>`:'—'}</td>
      <td><button class="action-btn" onclick="editVideo('${r.id}')" title="Edit">✎</button></td>
    </tr>`).join('');
}

function inlineEditViews(id) {
  const r = DATA.find(x=>x.id===id);
  const td = document.querySelector(`#vrow-${id} td:nth-child(5)`);
  const inp = document.createElement('input');
  inp.type='number'; inp.min='0'; inp.className='inline-input';
  inp.value=r.views48||0;
  td.innerHTML=''; td.appendChild(inp);
  inp.focus(); inp.select();
  inp.onblur=()=>inlineSave(id,'views48',parseInt(inp.value)||0);
  inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape')renderTable();};
}

function inlineEditSales(id) {
  const r = DATA.find(x=>x.id===id);
  const td = document.querySelector(`#vrow-${id} td:nth-child(6)`);
  const sel = document.createElement('select');
  sel.className='inline-select';
  ['✅ Yes','❌ No'].forEach(o=>{
    const opt=document.createElement('option');
    opt.value=o;opt.textContent=o;
    if(o===r.gotSales)opt.selected=true;
    sel.appendChild(opt);
  });
  td.innerHTML=''; td.appendChild(sel);
  sel.focus();
  sel.onchange=()=>inlineSave(id,'gotSales',sel.value);
  sel.onblur=()=>{if(document.activeElement!==sel)renderTable();};
}

async function inlineSave(id, field, value) {
  const r = DATA.find(x=>x.id===id);
  if(!r||r[field]===value){renderTable();return;}
  r[field]=value;
  renderTable();
  const propMap = {
    views48: {'Views (48hrs)':{number:value}},
    gotSales: {'Got Sales?':{select:{name:value}}},
  };
  try {
    await fetch(`${API}?endpoint=pages/${id}`,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({properties:propMap[field]})
    });
  } catch(e){console.error(e);}
}

function openModal(id=null) {
  editingId=id;
  document.getElementById('form-msg').textContent='';
  document.getElementById('btn-save').disabled=false;
  if(id){
    const r=DATA.find(x=>x.id===id);
    document.getElementById('modal-title').textContent='Edit Video';
    document.getElementById('inp-videoid').value=r.videoId;
    document.getElementById('inp-date').value=r.datePosted;
    document.getElementById('inp-product').value=r.product;
    document.getElementById('inp-time').value=r.timePosted;
    document.getElementById('inp-views').value=r.views48||0;
    document.getElementById('inp-sales').value=r.gotSales||'';
    document.getElementById('inp-type').value=r.videoType||'';
    document.getElementById('btn-save').textContent='Save Changes';
  } else {
    document.getElementById('modal-title').textContent='Log Video';
    document.getElementById('inp-videoid').value='';
    document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];
    document.getElementById('inp-product').value='';
    document.getElementById('inp-time').value='';
    document.getElementById('inp-views').value='';
    document.getElementById('inp-sales').value='';
    document.getElementById('inp-type').value='';
    document.getElementById('btn-save').textContent='Save to Notion';
  }
  document.getElementById('modal-overlay').classList.add('open');
}

function editVideo(id){openModal(id);}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

async function saveVideo() {
  const videoId=document.getElementById('inp-videoid').value.trim();
  const datePosted=document.getElementById('inp-date').value;
  const product=document.getElementById('inp-product').value.trim();
  const timePosted=document.getElementById('inp-time').value.trim();
  const views=parseInt(document.getElementById('inp-views').value)||0;
  const gotSales=document.getElementById('inp-sales').value;
  const videoType=document.getElementById('inp-type').value;
  if(!product){showMsg('Please enter a product.','error');return;}

  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Saving...';

  const properties={
    'Video ID':{title:[{text:{content:videoId||'—'}}]},
    'Product':{rich_text:[{text:{content:product}}]},
    'Time Posted':{rich_text:[{text:{content:timePosted}}]},
    'Views (48hrs)':{number:views},
    ...(datePosted?{'Date Posted':{date:{start:datePosted}}}:{}),
    ...(gotSales?{'Got Sales?':{select:{name:gotSales}}}:{}),
    ...(videoType?{'Video Type':{select:{name:videoType}}}:{}),
  };

  try {
    let res;
    if(editingId){
      res=await fetch(`${API}?endpoint=pages/${editingId}`,{
        method:'PATCH',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({properties})
      });
    } else {
      res=await fetch(`${API}?endpoint=pages`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({parent:{database_id:DB_ID},properties})
      });
    }
    if(res.ok){
      showMsg(editingId?'Updated! ✓':'Saved to Notion! ✓','success');
      btn.textContent='Saved ✓';
      setTimeout(()=>{closeModal();loadFromNotion();},1200);
    } else {
      showMsg('Error saving. Try again.','error');
      btn.disabled=false;btn.textContent='Save to Notion';
    }
  } catch(e){
    showMsg('Network error.','error');
    btn.disabled=false;btn.textContent='Save to Notion';
  }
}

function showMsg(msg,type){const el=document.getElementById('form-msg');el.textContent=msg;el.className='form-msg '+type;}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

loadFromNotion();
</script>
