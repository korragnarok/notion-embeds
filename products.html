<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#120d09">
<title>Products</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
:root{--espresso:#120d09;--brown-deep:#1c1410;--brown-mid:#2a1e16;--brown-lift:#3d2a1e;--brown-surface:#4a3428;--sage:#7a9e7e;--sage-light:#a8c5a4;--sage-dim:#4a6b4e;--tan:#c9a87a;--tan-dim:#7a5e3a;--text-bright:#f0e8de;--text-mid:#a89880;--text-muted:#6a5848;--border:rgba(200,168,120,0.1);--border-lift:rgba(200,168,120,0.2);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--espresso);color:var(--text-bright);font-family:'DM Sans',sans-serif;min-height:100vh;}
nav{background:rgba(18,13,9,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text-bright);text-decoration:none;}
.nav-logo span{color:var(--sage-light);font-style:italic;}
.nav-right{display:flex;gap:8px;}
.nav-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--text-muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s;text-decoration:none;display:inline-flex;align-items:center;}
.nav-btn:hover{border-color:var(--border-lift);color:var(--text-bright);}
.nav-btn.primary{background:var(--sage);color:var(--espresso);border-color:var(--sage);font-weight:600;}
.page-header{padding:24px 28px 18px;border-bottom:1px solid var(--border);}
.page-eyebrow{font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:var(--tan);margin-bottom:6px;font-weight:500;display:flex;align-items:center;gap:10px;}
.page-eyebrow::before{content:'';display:inline-block;width:20px;height:1px;background:var(--tan-dim);}
.page-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1;color:var(--text-bright);}
.page-title em{font-style:italic;color:var(--sage-light);}
.brand-tabs-wrap{background:var(--brown-deep);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 24px;}
.brand-tabs{display:flex;gap:2px;min-width:max-content;}
.tab{padding:10px 16px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.12s;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
.tab:hover{color:var(--text-bright);}
.tab.active{color:var(--sage-light);border-bottom-color:var(--sage-light);}
.main{max-width:1100px;margin:0 auto;padding:20px 24px 60px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.stat{background:var(--brown-mid);border-radius:12px;border:1px solid var(--border);padding:14px 16px;}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-muted);font-weight:600;margin-bottom:6px;}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;line-height:1;color:var(--text-bright);}
.stat-val.green{color:var(--sage-light);}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:3px;}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filter-btn{background:var(--brown-mid);border:1px solid var(--border);border-radius:100px;padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;color:var(--text-muted);transition:all 0.12s;}
.filter-btn.active{background:var(--text-bright);color:var(--espresso);border-color:var(--text-bright);}
.search-input{flex:1;min-width:160px;padding:7px 14px;border:1px solid var(--border);border-radius:100px;background:var(--brown-mid);color:var(--text-bright);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;}
.search-input::placeholder{color:var(--text-muted);}
.search-input:focus{border-color:var(--sage-dim);}
.table-wrap{background:var(--brown-mid);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead th{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-muted);padding:11px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--brown-lift);font-weight:600;cursor:pointer;white-space:nowrap;}
thead th:hover{color:var(--text-bright);}
thead th.num{text-align:right;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--brown-lift);}
tbody td{padding:11px 14px;font-size:13px;color:var(--text-bright);}
tbody td.num{text-align:right;}
.product-name{font-weight:500;}
.gmv-val{color:var(--sage-light);font-weight:500;}
.link-btn{color:var(--sage-light);text-decoration:none;font-size:12px;font-weight:500;}
.link-btn:hover{text-decoration:underline;}
.action-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:13px;padding:2px 5px;border-radius:4px;}
.action-btn:hover{background:var(--brown-surface);color:var(--text-bright);}
.empty-state{text-align:center;padding:48px;color:var(--text-muted);}
.core-badge{display:inline-block;background:var(--tan);color:var(--espresso);font-size:9px;font-weight:700;padding:1px 6px;border-radius:100px;letter-spacing:0.06em;text-transform:uppercase;margin-left:4px;vertical-align:middle;}
.stock-pill{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:500;}
.stock-In-Stock{background:rgba(122,158,126,0.15);color:var(--sage-light);}
.stock-Out-of-Stock{background:rgba(180,60,60,0.12);color:#d4604a;}
.stock-Low-Stock{background:rgba(201,168,122,0.15);color:var(--tan);}
.editable-cell{cursor:pointer;border-radius:4px;padding:2px 4px;transition:background 0.12s;}
.editable-cell:hover{background:var(--brown-lift);}
.inline-input{padding:4px 8px;border:1px solid var(--sage-dim);border-radius:6px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--brown-deep);color:var(--text-bright);outline:none;width:80px;}
.inline-select{padding:4px 8px;border:1px solid var(--sage-dim);border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;background:var(--brown-deep);color:var(--text-bright);outline:none;cursor:pointer;}
.loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--sage);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(12,8,4,0.75);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--brown-mid);border-radius:24px 24px 0 0;border:1px solid var(--border);border-bottom:none;padding:24px 20px 32px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,0.5);}
.modal-handle{width:36px;height:4px;background:var(--brown-surface);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:20px;color:var(--text-bright);}
.form-group{margin-bottom:13px;}
.form-label{display:block;font-size:10px;font-weight:600;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}
.form-input,.form-select{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:12px;background:var(--brown-deep);color:var(--text-bright);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;transition:border-color 0.12s;}
.form-input::placeholder{color:var(--text-muted);}
.form-input:focus,.form-select:focus{border-color:var(--sage-dim);}
.form-select option{background:var(--brown-deep);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:8px;margin-top:20px;}
.btn-cancel{flex:1;background:var(--brown-lift);border:none;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;color:var(--text-muted);font-family:'DM Sans',sans-serif;}
.btn-save{flex:2;background:var(--sage);border:none;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;color:var(--espresso);font-family:'DM Sans',sans-serif;font-weight:600;}
.btn-save:disabled{opacity:0.6;cursor:not-allowed;}
.form-msg{font-size:12px;margin-top:10px;text-align:center;min-height:18px;}
.form-msg.success{color:var(--sage-light);}
.form-msg.error{color:#d4604a;}
@media(max-width:640px){.stats{grid-template-columns:1fr 1fr;}.main{padding:14px 12px 60px;}.form-row,.form-row-3{grid-template-columns:1fr;}}
</style>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")
          .then(reg => console.log("[SW] Registered", reg.scope))
          .catch(err => console.warn("[SW] Failed", err));
      });
    }
  </script>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">hello<span>itskortny</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-btn">← Home</a>
    <button class="nav-btn" onclick="loadFromNotion()">↻ Refresh</button>
    <button class="nav-btn primary" onclick="openModal()">+ Add Product</button>
  </div>
</nav>
<div class="page-header">
  <div class="page-eyebrow">@helloitskortny</div>
  <div class="page-title">Product <em>Database</em></div>
</div>
<div class="brand-tabs-wrap"><div class="brand-tabs" id="brand-tabs"></div></div>
<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-label">Products</div><div class="stat-val green" id="stat-products">—</div><div class="stat-sub" id="stat-products-sub">—</div></div>
    <div class="stat"><div class="stat-label">Total Sold</div><div class="stat-val" id="stat-sold">—</div><div class="stat-sub">units</div></div>
    <div class="stat"><div class="stat-label">Total GMV</div><div class="stat-val" id="stat-gmv">—</div><div class="stat-sub">all products</div></div>
    <div class="stat"><div class="stat-label">Posted</div><div class="stat-val" id="stat-posted">—</div><div class="stat-sub" id="stat-posted-sub">—</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
    <button class="filter-btn" onclick="setFilter('In Stock',this)">In Stock</button>
    <button class="filter-btn" onclick="setFilter('Out of Stock',this)">Out of Stock</button>
    <input type="text" class="search-input" id="search-input" placeholder="Search products..." oninput="renderTable()">
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('product')">Product</th>
        <th onclick="sortBy('brand')">Brand</th>
        <th onclick="sortBy('stock')">Stock</th>
        <th onclick="sortBy('sold')" class="num">Sold</th>
        <th onclick="sortBy('gmv')" class="num">GMV</th>
        <th>Link</th>
        <th></th>
      </tr></thead>
      <tbody id="table-body"><tr><td colspan="7"><div style="text-align:center;padding:32px"><div class="loading-spinner"></div><div style="color:var(--text-muted)">Loading...</div></div></td></tr></tbody>
    </table>
  </div>
</div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Add Product</div>
    <div class="form-group"><label class="form-label">Product Name</label><input type="text" class="form-input" id="inp-product" placeholder="e.g. Temptations Shallow Bowls"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Brand</label><select class="form-select" id="inp-brand"><option value="">— Select —</option><option>Comfrt</option><option>Mellow</option><option>Pet Lab Co</option><option>Sand Cloud</option><option>Woof</option><option>Goli</option><option>Grüns</option><option>Spark Paws</option><option>Muddy Mat</option><option>QVC</option><option>Honnity</option><option>SnowClad</option><option>Kitsch</option><option>Liquid IV</option><option>NiHome</option><option>Owala</option><option>Shark</option><option>We Love Doodles</option><option>Giratree</option><option>Flur</option><option>King Lou</option><option>Levoit</option><option>Dog Friendly Co</option><option>Sungboon</option><option>Loaded Tea Shop</option><option>MyQ</option><option>She's Birdie</option><option>Choxbox</option></select></div>
      <div class="form-group"><label class="form-label">Date</label><input type="date" class="form-input" id="inp-day"></div>
    </div>
    <div class="form-row-3">
      <div class="form-group"><label class="form-label">Status</label><select class="form-select" id="inp-status"><option value="To Do">To Do</option><option value="Posted">Posted</option><option value="None">None</option></select></div>
      <div class="form-group"><label class="form-label">Stock</label><select class="form-select" id="inp-stock"><option value="In Stock">In Stock</option><option value="Low Stock">Low Stock</option><option value="Out of Stock">Out of Stock</option></select></div>
      <div class="form-group"><label class="form-label">Go Live?</label><select class="form-select" id="inp-golive"><option value="no">No</option><option value="yes">Yes</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Units Sold</label><input type="number" class="form-input" id="inp-sold" placeholder="0" min="0"></div>
      <div class="form-group"><label class="form-label">GMV ($)</label><input type="number" class="form-input" id="inp-gmv" placeholder="0.00" step="0.01" min="0"></div>
    </div>
    <div class="form-group"><label class="form-label">TikTok Shop Link</label><input type="url" class="form-input" id="inp-link" placeholder="https://..."></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveProduct()">Save to Notion</button>
    </div>
    <div class="form-msg" id="form-msg"></div>
  </div>
</div>
<script>
const API='https://kortny-api.vercel.app/api/notion';
const DB_ID='d99b6dec79ba46f1a564af4d00f7220d';
const CORE_FIVE=['Pet Lab Co','Sand Cloud','QVC'];
let DATA=[],currentBrand='All',statusFilter='All',sortField='product',sortDir=-1,editingId=null;
function fmt(n){return'$'+Math.round(n).toLocaleString('en-US');}
async function loadFromNotion(){
  document.getElementById('table-body').innerHTML='<tr><td colspan="7"><div style="text-align:center;padding:32px"><div class="loading-spinner"></div><div style="color:var(--text-muted)">Loading...</div></div></td></tr>';
  try{
    let results=[],cursor=null;
    do{const body={page_size:100,sorts:[{property:'Day',direction:'descending'}]};if(cursor)body.start_cursor=cursor;const res=await fetch(`${API}?endpoint=databases/${DB_ID}/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json();results=[...results,...(data.results||[])];cursor=data.next_cursor;}while(cursor);
    DATA=results.filter(p=>!p.archived&&!p.in_trash).map(p=>({id:p.id,product:p.properties.Product?.title?.[0]?.plain_text||'',brand:p.properties.Brand?.select?.name||'',status:p.properties.Status?.status?.name||'To Do',stock:p.properties.Stock?.select?.name||'',sold:p.properties.Sold?.number||0,gmv:p.properties.GMV?.number||0,day:p.properties.Day?.date?.start||'',link:p.properties['TikTok Shop Link']?.url||''})).filter(p=>p.product);
    buildTabs();renderTable();
  }catch(e){document.getElementById('table-body').innerHTML='<tr><td colspan="7" class="empty-state">Error loading. Try refreshing.</td></tr>';}
}
function buildTabs(){
  const brands=['All',...[...new Set(DATA.map(d=>d.brand).filter(Boolean))].sort()];
  const wrap=document.getElementById('brand-tabs');wrap.innerHTML='';
  brands.forEach(b=>{const btn=document.createElement('button');btn.className='tab'+(b===currentBrand?' active':'');btn.textContent=b==='All'?'All Brands':b;btn.onclick=()=>{currentBrand=b;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderTable();};wrap.appendChild(btn);});
}
function updateStats(filtered){
  const sold=filtered.reduce((s,r)=>s+(r.sold||0),0),gmv=filtered.reduce((s,r)=>s+(r.gmv||0),0),posted=filtered.filter(r=>r.status==='Posted').length;
  document.getElementById('stat-products').textContent=filtered.length;document.getElementById('stat-products-sub').textContent=currentBrand==='All'?'across all brands':currentBrand;document.getElementById('stat-sold').textContent=sold.toLocaleString();document.getElementById('stat-gmv').textContent=fmt(gmv);document.getElementById('stat-posted').textContent=posted;document.getElementById('stat-posted-sub').textContent=filtered.length?Math.round(posted/filtered.length*100)+'% posted':'—';
}
function setFilter(f,btn){statusFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable();}
function sortBy(field){if(sortField===field)sortDir*=-1;else{sortField=field;sortDir=-1;}renderTable();}
function getFiltered(){
  const search=document.getElementById('search-input').value.toLowerCase();
  return DATA.filter(r=>{if(currentBrand!=='All'&&r.brand!==currentBrand)return false;if(statusFilter==='In Stock'&&r.stock!=='In Stock')return false;if(statusFilter==='Out of Stock'&&r.stock!=='Out of Stock')return false;if(search&&!r.product.toLowerCase().includes(search)&&!r.brand.toLowerCase().includes(search))return false;return true;}).sort((a,b)=>{let av=a[sortField]||'',bv=b[sortField]||'';if(sortField==='sold'||sortField==='gmv'){av=Number(a[sortField]||0);bv=Number(b[sortField]||0);}if(av<bv)return -1*sortDir;if(av>bv)return 1*sortDir;return 0;});
}
function renderTable(){
  const filtered=getFiltered();updateStats(filtered);const tbody=document.getElementById('table-body');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="7" class="empty-state">No products found</td></tr>';return;}
  tbody.innerHTML=filtered.map(r=>{
    const isCore=CORE_FIVE.includes(r.brand);const stockClass=r.stock?'stock-'+r.stock.replace(/\s/g,'-'):'';
    return`<tr id="row-${r.id}"><td class="product-name">${r.product}${isCore?'<span class="core-badge">Core</span>':''}</td><td style="color:var(--text-mid)">${r.brand||'—'}</td><td><span class="${r.stock?`stock-pill ${stockClass}`:''} editable-cell" onclick="inlineEditStock('${r.id}')" title="Click to change">${r.stock||'—'}</span></td><td class="num"><span class="editable-cell" onclick="inlineEditNumber('${r.id}','sold')" title="Click to edit">${r.sold||0}</span></td><td class="num gmv-val"><span class="editable-cell" onclick="inlineEditNumber('${r.id}','gmv')" title="Click to edit">${r.gmv?fmt(r.gmv):'—'}</span></td><td>${r.link?`<a href="${r.link}" target="_blank" class="link-btn">Shop ↗</a>`:'—'}</td><td><button class="action-btn" onclick="editProduct('${r.id}')">✎</button></td></tr>`;
  }).join('');
}
function inlineEditStock(id){const r=DATA.find(x=>x.id===id);const td=document.querySelector(`#row-${id} td:nth-child(3)`);const sel=document.createElement('select');sel.className='inline-select';['In Stock','Low Stock','Out of Stock'].forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;if(o===r.stock)opt.selected=true;sel.appendChild(opt);});td.innerHTML='';td.appendChild(sel);sel.focus();sel.onchange=()=>inlineSave(id,'stock',sel.value);sel.onblur=()=>{if(document.activeElement!==sel)renderTable();};}
function inlineEditNumber(id,field){const r=DATA.find(x=>x.id===id);const colIdx=field==='sold'?4:5;const td=document.querySelector(`#row-${id} td:nth-child(${colIdx})`);const inp=document.createElement('input');inp.type='number';inp.min='0';inp.step=field==='gmv'?'0.01':'1';inp.className='inline-input';inp.value=r[field]||0;td.innerHTML='';td.appendChild(inp);inp.focus();inp.select();inp.onblur=()=>inlineSave(id,field,field==='gmv'?parseFloat(inp.value)||0:parseInt(inp.value)||0);inp.onkeydown=e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape')renderTable();};}
async function inlineSave(id,field,value){const r=DATA.find(x=>x.id===id);if(!r||r[field]===value){renderTable();return;}r[field]=value;renderTable();const propMap={stock:{Stock:{select:{name:value}}},sold:{Sold:{number:value}},gmv:{GMV:{number:value}}};try{await fetch(`${API}?endpoint=pages/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({properties:propMap[field]})});}catch(e){console.error(e);}}
function openModal(id=null){
  editingId=id;document.getElementById('form-msg').textContent='';document.getElementById('btn-save').disabled=false;
  if(id){const r=DATA.find(x=>x.id===id);document.getElementById('modal-title').textContent='Edit Product';document.getElementById('inp-product').value=r.product;document.getElementById('inp-brand').value=r.brand;document.getElementById('inp-day').value=r.day;document.getElementById('inp-status').value=r.status;document.getElementById('inp-stock').value=r.stock||'In Stock';document.getElementById('inp-sold').value=r.sold||0;document.getElementById('inp-gmv').value=r.gmv||0;document.getElementById('inp-link').value=r.link||'';document.getElementById('btn-save').textContent='Save Changes';}
  else{document.getElementById('modal-title').textContent='Add Product';document.getElementById('inp-product').value='';document.getElementById('inp-brand').value=currentBrand!=='All'?currentBrand:'';document.getElementById('inp-day').value=new Date().toISOString().split('T')[0];document.getElementById('inp-status').value='To Do';document.getElementById('inp-stock').value='In Stock';document.getElementById('inp-sold').value='';document.getElementById('inp-gmv').value='';document.getElementById('inp-link').value='';document.getElementById('btn-save').textContent='Save to Notion';}
  document.getElementById('modal-overlay').classList.add('open');
}
function editProduct(id){openModal(id);}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
async function saveProduct(){
  const product=document.getElementById('inp-product').value.trim(),brand=document.getElementById('inp-brand').value,day=document.getElementById('inp-day').value,status=document.getElementById('inp-status').value,stock=document.getElementById('inp-stock').value,sold=parseInt(document.getElementById('inp-sold').value)||0,gmv=parseFloat(document.getElementById('inp-gmv').value)||0,link=document.getElementById('inp-link').value.trim();
  if(!product||!brand){showMsg('Please fill in product name and brand.','error');return;}
  const btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Saving...';
  const properties={'Product':{title:[{text:{content:product}}]},'Brand':{select:{name:brand}},'Status':{status:{name:status}},'Stock':{select:{name:stock}},'Sold':{number:sold},'GMV':{number:gmv},...(link?{'TikTok Shop Link':{url:link}}:{}),...(day?{'Day':{date:{start:day}}}:{})};
  try{let res;if(editingId){res=await fetch(`${API}?endpoint=pages/${editingId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({properties})});}else{res=await fetch(`${API}?endpoint=pages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({parent:{database_id:DB_ID},properties})});}
  if(res.ok){showMsg(editingId?'Updated! ✓':'Saved! ✓','success');btn.textContent='Saved ✓';setTimeout(()=>{closeModal();loadFromNotion();},1200);}else{showMsg('Error saving.','error');btn.disabled=false;btn.textContent='Save to Notion';}}catch(e){showMsg('Network error.','error');btn.disabled=false;btn.textContent='Save to Notion';}
}
function showMsg(msg,type){const el=document.getElementById('form-msg');el.textContent=msg;el.className='form-msg '+type;}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
loadFromNotion();
</script>
</body>
</html>
